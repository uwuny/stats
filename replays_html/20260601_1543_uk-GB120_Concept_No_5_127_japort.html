<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WoT Replay Viewer: </title>
<style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
    #map-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #111; position: relative; border-right: 2px solid #333; padding: 10px; overflow: hidden; }
    #canvas-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    canvas { background: #222; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; width: auto; height: auto; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #sidebar { width: 380px; background: #1e1e1e; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; border-left: 1px solid #333; }
    .panel { background: #2a2a2a; padding: 12px; border-radius: 8px; }
    h3 { margin: 0 0 10px 0; font-size: 1em; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .player-list { max-height: 350px; overflow-y: auto; }
    .player-item { display: flex; align-items: center; padding: 6px 8px; cursor: pointer; border-radius: 4px; transition: background 0.2s; margin-bottom: 2px; }
    .player-item:hover { background: #383838; }
    .player-item input { margin-right: 8px; transform: scale(1.1); cursor: pointer; }
    .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; border: 1px solid #fff; flex-shrink: 0; }
    .team-badge { font-size: 0.85em; margin-left: auto; opacity: 0.9; padding: 2px 6px; border-radius: 3px; background: #333; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button, select { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
    button:hover { background: #555; }
    button.active { background: #4CAF50; }
    .time-display { font-family: monospace; font-size: 1.2em; margin-left: auto; min-width: 50px; text-align: right; }
    .timeline { position: relative; height: 40px; background: #222; border-radius: 6px; margin-top: 8px; }
    input[type=range] { position: absolute; top: 12px; left: 10px; right: 10px; width: calc(100% - 20px); }
    .frags-layer { position: absolute; top: 0; left: 10px; right: 10px; height: 100%; pointer-events: none; }
    .frag-mark { position: absolute; top: 0; width: 3px; height: 100%; opacity: 0.9; border-radius: 2px; }
    .team-toggle { display: flex; align-items: center; gap: 10px; background: #333; padding: 8px 12px; border-radius: 6px; }
    .toggle-switch { position: relative; width: 50px; height: 26px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #F44336; border-radius: 26px; transition: 0.3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background: #4CAF50; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
    .toggle-label { font-size: 0.9em; }
    .filter-btns { display: flex; gap: 4px; margin-bottom: 8px; }
    .filter-btn { flex: 1; padding: 4px 8px; font-size: 0.8em; }
    .filter-btn.active { background: #4CAF50; }
    .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 4px; z-index: 100; }
    .zoom-btn { width: 36px; height: 36px; border-radius: 6px; background: rgba(34,34,34,0.9); color: #fff; border: 1px solid #555; font-size: 1.2em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .zoom-btn:hover { background: rgba(68,68,68,0.9); }
    .zoom-level { font-size: 0.75em; color: #aaa; text-align: center; margin-top: 4px; background: rgba(34,34,34,0.8); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div id="map-area">
    <div id="canvas-container">
        <canvas id="gameCanvas" width="1000" height="1000"></canvas>
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomIn">+</button>
            <button class="zoom-btn" id="zoomOut">−</button>
            <div class="zoom-level" id="zoomLevel">100%</div>
        </div>
    </div>
</div>
<div id="sidebar">
    <div class="panel">
        <h3>⏱ Плеер</h3>
        <div class="controls">
            <button id="playBtn">▶ Play</button>
            <select id="speed">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="1">1x</option>
                <option value="2" selected>2x</option>
                <option value="5">5x</option>
            </select>
            <div class="time-display" id="timeDisp">00:00</div>
        </div>
    </div>
    <div class="panel">
        <h3>
            👥 Игроки
            <span style="font-size:0.85em; color:#888;">
                <button id="selectAll" style="padding:2px 6px; font-size:0.8em;">Все</button>
                <button id="deselectAll" style="padding:2px 6px; font-size:0.8em;">Никто</button>
            </span>
        </h3>
        <div class="filter-btns">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="1">Команда 1🟢</button>
            <button class="filter-btn" data-filter="2">Команда 2🔴</button>
        </div>
        <div class="player-list" id="playerList"></div>
    </div>
    <div class="panel">
        <h3>🎨 Цвета команд</h3>
        <div class="team-toggle">
            <span class="toggle-label">Команда 1🟢</span>
            <label class="toggle-switch">
                <input type="checkbox" id="teamToggle">
                <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Команда 2🔴</span>
        </div>
        <small style="color:#888; display:block; margin-top:6px;">Переключите, чтобы поменять цвета команд местами</small>
    </div>
    <div class="panel">
        <h3>🎯 Таймлайн</h3>
        <div class="timeline" id="tLine">
            <div class="frags-layer" id="fragsLayer"></div>
            <input type="range" id="slider" min="0" max="100" value="0" step="0.1">
        </div>
    </div>
</div>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const mapImg = new Image();
if("../maps/01_karelia.png") mapImg.src = "../maps/01_karelia.png";

let maxTime = 0;
let currentTime = 0;
let isPlaying = false;
let playerFilter = 'all';
let zoom = 1;
let panX = 0;
let panY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;

function getTeamColor(teamNum) {
    const swapped = document.getElementById('teamToggle').checked;
    if(swapped) return teamNum == 1 ? '#F44336' : '#4CAF50';
    return teamNum == 1 ? '#4CAF50' : '#F44336';
}

function init() {
    for(let p in DATA.positions) {
        DATA.positions[p].forEach(pt => { if(pt.t > maxTime) maxTime = pt.t; });
    }
    document.getElementById('slider').max = maxTime;
    renderPlayerList();
    renderFrags(); 
    draw();
    setupZoom();
}

function renderPlayerList() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';
    const sortedPlayers = [...DATA.players].sort((a, b) => a.team - b.team);
    sortedPlayers.forEach(p => {
        if(playerFilter !== 'all' && p.team != playerFilter) return;
        const color = getTeamColor(p.team);
        const teamNum = p.team ?? 1;
        const tIcon = teamNum == 1 ? '🟢' : '🔴';
        const div = document.createElement('div');
        div.className = 'player-item';
        div.dataset.pid = p.id;
        div.dataset.team = teamNum;
        div.innerHTML = `<input type="checkbox" checked id="chk_${p.id}"><span class="dot" style="background:${color}"></span><span style="flex:1; font-size:0.9em;">${p.name}</span><span class="team-badge">${tIcon}</span>`;
        list.appendChild(div);
    });
}

function renderFrags() {
    const layer = document.getElementById('fragsLayer');
    layer.innerHTML = '';
    DATA.frags.forEach(f => {
        const m = document.createElement('div'); 
        m.className = 'frag-mark';
        m.style.left = (f.t / maxTime * 100) + '%';
        m.style.background = getTeamColor(f.killer_team ?? 1);
        layer.appendChild(m);
    });
}

function applyTransform() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.translate(500 + panX, 500 + panY);
    ctx.scale(zoom, zoom);
    ctx.translate(-500, -500);
}

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, 1000, 1000);
    applyTransform();
    try {
        if(mapImg.complete && mapImg.naturalWidth > 0) {
            ctx.drawImage(mapImg, 0, 0, 1000, 1000);
        } else {
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,1000,1000);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1 / zoom; ctx.beginPath();
            for(let i=0; i<=1000; i+=50) { ctx.moveTo(i,0); ctx.lineTo(i,1000); ctx.moveTo(0,i); ctx.lineTo(1000,i); }
            ctx.stroke();
        }
    } catch(e) {}
    for(let pid in DATA.positions) {
        try {
            const chk = document.getElementById(`chk_${pid}`);
            if(!chk || !chk.checked) continue;
            const path = DATA.positions[pid];
            const pInfo = DATA.players.find(p => p.id == pid);
            if(!pInfo) continue;
            const color = getTeamColor(pInfo.team);
            ctx.strokeStyle = color; ctx.lineWidth = 2 / zoom; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath();
            let started = false; let lastPt = null;
            for(let pt of path) {
                if(pt.t > currentTime) break;
                if(!started) { ctx.moveTo(pt.x, pt.y); started = true; } else ctx.lineTo(pt.x, pt.y);
                lastPt = pt;
            }
            ctx.stroke();
            if(lastPt) {
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(lastPt.x, lastPt.y, 5 / zoom, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2 / zoom; ctx.stroke();
            }
        } catch(e) { console.error('Path error:', e); }
    }
    for(let pid in DATA.positions) {
        try {
            const chk = document.getElementById(`chk_${pid}`);
            if(!chk || !chk.checked) continue;
            const path = DATA.positions[pid];
            const pInfo = DATA.players.find(p => p.id == pid);
            if(!pInfo) continue;
            let lastPt = null;
            for(let pt of path) { if(pt.t > currentTime) break; lastPt = pt; }
            if(lastPt && pInfo.name) {
                ctx.save(); ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1;

            }
        } catch(e) { console.error('Name render error:', e); }
    }
}

function setupZoom() {
    document.getElementById('zoomIn').onclick = () => setZoom(zoom * 1.25);
    document.getElementById('zoomOut').onclick = () => setZoom(zoom / 1.25);
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); setZoom(zoom * (e.deltaY > 0 ? 0.9 : 1.1), e.offsetX, e.offsetY);
    }, { passive: false });
    canvas.addEventListener('mousedown', (e) => { isDragging = true; dragStartX = e.clientX - panX; dragStartY = e.clientY - panY; });
    canvas.addEventListener('mousemove', (e) => { if(!isDragging) return; panX = e.clientX - dragStartX; panY = e.clientY - dragStartY; draw(); });
    canvas.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('mouseleave', () => { isDragging = false; });
    canvas.addEventListener('dblclick', () => { zoom=1; panX=0; panY=0; draw(); });
}

function setZoom(newZoom, mouseX, mouseY) {
    newZoom = Math.max(0.5, Math.min(4, newZoom));
    if(mouseX !== undefined) {
        const worldX = (mouseX - 500 - panX) / zoom + 500;
        const worldY = (mouseY - 500 - panY) / zoom + 500;
        zoom = newZoom;
        panX = mouseX - 500 - (worldX - 500) * zoom;
        panY = mouseY - 500 - (worldY - 500) * zoom;
    } else zoom = newZoom;
    document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
    draw();
}

const slider = document.getElementById('slider');
slider.oninput = () => { currentTime = parseFloat(slider.value); updateTime(); draw(); };

function updateTime() {
    const m = Math.floor(currentTime / 60), s = Math.floor(currentTime % 60);
    document.getElementById('timeDisp').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

document.getElementById('playBtn').onclick = () => {
    isPlaying = !isPlaying;
    document.getElementById('playBtn').textContent = isPlaying ? '❚❚ Pause' : '▶ Play';
    document.getElementById('playBtn').classList.toggle('active', isPlaying);
    if(isPlaying) loop();
};

function loop() {
    if(!isPlaying) return;
    currentTime += 0.05 * parseFloat(document.getElementById('speed').value);
    if(currentTime > maxTime) { currentTime = 0; isPlaying = false; document.getElementById('playBtn').textContent = '▶ Play'; document.getElementById('playBtn').classList.remove('active'); }
    slider.value = currentTime; updateTime(); draw(); requestAnimationFrame(loop);
};

document.getElementById('selectAll').onclick = () => { document.querySelectorAll('#playerList input[type="checkbox"]').forEach(cb => cb.checked = true); draw(); };
document.getElementById('deselectAll').onclick = () => { document.querySelectorAll('#playerList input[type="checkbox"]').forEach(cb => cb.checked = false); draw(); };

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); playerFilter = btn.dataset.filter; renderPlayerList();
    };
});

document.getElementById('teamToggle').onchange = () => { renderPlayerList(); renderFrags(); draw(); };

mapImg.onload = init; mapImg.onerror = init;
if(!"../maps/01_karelia.png") init();
</script>
