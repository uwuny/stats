<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Просмотр повтора боя — Линия Маннергейма">
<title>Линия Маннергейма</title>
<link rel="icon" type="image/png" sizes="501x501" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
    --asphalt:      #3d4b52;
    --asphalt-lt:   var(--color-accent);
    --asphalt-llt:  var(--text-secondary);
    --asphalt-dim:  rgb(255 255 255 / 6%);
    --asphalt-mid:  rgb(255 255 255 / 16%);

    --team1:        #45d66f;
    --team1-dim:    rgba(69, 214, 111, 0.10);
    --team1-mid:    rgba(69, 214, 111, 0.24);
    --team1-rgb:    69 214 111;

    --team2:        #e45a5a;
    --team2-dim:    rgba(228, 90, 90, 0.10);
    --team2-mid:    rgba(228, 90, 90, 0.24);
    --team2-rgb:    228 90 90;

    --color-bg:       #2C2C2E;
    --card-bg:        rgba(42, 42, 45, 0.55);
    --card-bg-strong: rgba(46, 46, 49, 0.68);
    --sidebar-bg:     var(--card-bg);
    --panel-bg:       rgba(30, 30, 32, 0.75);
    --line:           rgb(255 255 255 / 6%);
    --line-lt:        rgb(255 255 255 / 12%);

    --text:           #f0f0f0;
    --text-secondary: #9a9a9a;
    --text-dim:       rgb(240 240 240 / 40%);
    --text-muted:     #9a9a9a;

    --color-accent:          #45d66f;
    --color-accent-rgb:      69 214 111;
    --color-accent-soft:     #2c6b45;
    --color-accent-soft-rgb: 44 107 69;

    --danger:       #e45a5a;
    --danger-rgb:   228 90 90;

    --glass-blur:    20px;
    --glass-blur-sm: 12px;
    --glass-bg:            rgba(42, 42, 45, 0.55);
    --glass-bg-strong:     rgba(52, 52, 55, 0.62);
    --glass-bg-active:     rgba(58, 58, 62, 0.7);
    --glass-border:        rgb(255 255 255 / 8%);
    --glass-border-strong: rgb(255 255 255 / 14%);
    --glass-highlight:     rgba(255, 255, 255, 0.08);
    --glass-shade:         rgba(0, 0, 0, 0.45);
    --glass-shadow:    0 14px 40px rgb(0 0 0 / 40%), inset 0 1px 0 var(--glass-highlight), inset 0 -14px 20px -14px var(--glass-shade);
    --glass-shadow-sm: 0 6px 18px rgb(0 0 0 / 32%), inset 0 1px 0 var(--glass-highlight);

    --shadow-border:       0 4px 14px rgb(0 0 0 / 24%), inset 0 1px 0 rgb(255 255 255 / 6%);
    --shadow-border-hover: 0 6px 18px rgb(0 0 0 / 30%), inset 0 1px 0 rgb(255 255 255 / 12%);
    --shadow-inset:        inset 0 1px 0 rgb(255 255 255 / 5%);

    --glass-shadow-stack: inset 0 1px 0 var(--glass-highlight), inset 0 -14px 20px -14px var(--glass-shade);

    --font-ui:      'Chakra Petch', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;

    --radius-sm:    10px;
    --radius-md:    14px;
    --radius-lg:    20px;
    --radius-xl:    22px;
    --radius-full:  999px;

    --duration-fast: 120ms;
    --duration-base: 180ms;
    --duration-med:  250ms;
    --duration-slow: 350ms;
    --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    --map-w: 1000;
    --map-h: 1000;
}

*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scrollbar-width: thin;
    scrollbar-color: rgb(255 255 255 / 35%) transparent;
}

body {
    font-family: var(--font-ui);
    background: #2C2C2E;
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    padding: 11px;
    gap: 11px;
    box-sizing: border-box;
}

button {
    font: inherit;
    color: inherit;
}

img {
    max-width: 100%;
    display: block;
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
    }
}

#map-area {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: 0;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    padding: 16px;
    overflow: hidden;
    backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    box-shadow: var(--glass-shadow);
    transition: box-shadow var(--duration-med) var(--ease-out);
}

#canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 1000px;
    max-height: 100%;
    aspect-ratio: var(--map-w, 1) / var(--map-h, 1);
    flex-shrink: 1;
}

canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #101314;
    border-radius: var(--radius-md);
    box-shadow: 0 0 0 1px rgb(255 255 255 / 6%), var(--glass-shadow);
    cursor: grab;
}

canvas:active { cursor: grabbing; }

#fgCanvas { background: transparent; }

#damage-popups {
    position: absolute;
    inset: 0;
    z-index: 10;
    overflow: hidden;
    pointer-events: none;
}

.dmg-popup {
    position: absolute;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 0 5px rgba(0, 0, 0, 0.9), 0 0 2px #000, 1px 1px 2px rgba(0, 0, 0, 0.8);
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

#map-toolbar {
    flex-shrink: 0;
    align-self: flex-end;
    width: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 8px;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    box-shadow: var(--glass-shadow);
}

.zoom-btn,
.filter-toggle-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg, rgb(255 255 255 / 8%));
    color: var(--text-muted);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-border);
    cursor: pointer;
    backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    transition: color var(--duration-med) var(--ease-out), box-shadow var(--duration-med) var(--ease-out), border-color var(--duration-med) var(--ease-out), translate var(--duration-fast) var(--ease-out), scale var(--duration-fast) var(--ease-out);
}

.zoom-btn { font-family: var(--font-mono); font-size: 1.1em; }
.filter-toggle-btn { font-size: 1em; }

.hits-link-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg, rgb(255 255 255 / 8%));
    color: var(--text-muted);
    text-decoration: none;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-border);
    cursor: pointer;
    backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    transition: color var(--duration-med) var(--ease-out), box-shadow var(--duration-med) var(--ease-out), background var(--duration-med) var(--ease-out), border-color var(--duration-med) var(--ease-out), translate var(--duration-fast) var(--ease-out), scale var(--duration-fast) var(--ease-out);
}
.hits-link-btn:hover {
    color: var(--color-accent);
    box-shadow: var(--shadow-border-hover);
    background: rgb(var(--color-accent-soft-rgb) / 45%);
    translate: 0 -1px;
}
.hits-link-btn:active { scale: 0.96; translate: 0 0; }
.hits-link-btn.is-disabled { opacity: 0.3; pointer-events: none; }

.zoom-btn:hover,
.filter-toggle-btn:hover {
    color: var(--text);
    border-color: var(--glass-border-strong);
    background: var(--glass-bg-strong, rgb(255 255 255 / 14%));
    box-shadow: var(--shadow-border-hover);
    translate: 0 -1px;
}


.zoom-btn:active,
.filter-toggle-btn:active { scale: 0.96; translate: 0 0; }

.filter-toggle-btn.is-active {
    color: var(--color-accent);
    background: rgb(var(--color-accent-soft-rgb) / 45%);
    border-color: var(--glass-border-strong);
    box-shadow: inset 0 1px 0 rgb(255 255 255 / 16%);
}

.zoom-level {
    font-family: var(--font-mono);
    font-size: 0.6em;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-align: center;
    color: var(--text-dim);
    background: var(--glass-bg, rgb(255 255 255 / 8%));
    border: 1px solid var(--glass-border);
    padding: 5px 2px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-border);
    backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur-sm)) saturate(160%);
    font-variant-numeric: tabular-nums;
}

.reset-icon          { display: block; }
.reset-icon.is-spinning { animation: spin 0.45s cubic-bezier(0.4, 0, 0.2, 1) 1; }

@keyframes spin { to { transform: rotate(360deg); } }

.map-filter-panel {
    display: none;
    position: absolute;
    bottom: 0;
    right: 0;
    z-index: 200;
    width: 220px;
    flex-direction: column;
    gap: 6px;
    background:
        linear-gradient(180deg, rgb(255 255 255 / 6%), transparent 50%),
        var(--panel-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 10px;
    backdrop-filter: blur(var(--glass-blur)) saturate(180%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
    box-shadow: var(--glass-shadow);
}

.map-filter-panel.is-open { display: flex; }

.map-filter-panel__title {
    font-size: 0.58em;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    color: var(--asphalt-llt);
    margin-bottom: 4px;
}

.map-filter-panel__divider {
    height: 1px;
    background: var(--line);
    margin: 2px 0;
}

.map-filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--line-lt);
    border-radius: var(--radius-md);
    font-size: 0.72em;
    font-weight: 600;
    color: var(--text-muted);
    background: transparent;
    cursor: pointer;
    user-select: none;
    transition: color 0.16s, border-color 0.16s, background 0.16s, scale 0.15s;
}

.map-filter-option:active { scale: 0.96; }

.map-filter-option:hover:not(.is-on) {
    border-color: var(--glass-border-strong);
    background: rgb(255 255 255 / 6%);
}

.map-filter-option.is-on {
    color: var(--text);
    border-color: var(--asphalt-mid);
    background: var(--asphalt-dim);
}

.map-filter-option__dot {
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line-lt);
    border: 1px solid var(--asphalt-mid);
    transition: background 0.16s, box-shadow 0.16s, border-color 0.16s;
}

.map-filter-option.is-on .map-filter-option__dot {
    background: var(--team1);
    border-color: var(--team1);
    box-shadow: 0 0 6px var(--team1-mid);
}

#sidebar {
    width: 42%;
    flex: 0 0 42%;
    min-width: 380px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 11px;
    overflow: hidden;
    background: transparent;
    border: none;
}

.top-card {
    flex-shrink: 0;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    box-shadow: var(--glass-shadow-stack);
}

#sidebar::-webkit-scrollbar             { width: 8px; }
#sidebar::-webkit-scrollbar-track       { background: transparent; }
#sidebar::-webkit-scrollbar-thumb       { background: linear-gradient(180deg, rgb(255 255 255 / 45%), rgb(255 255 255 / 22%)); border-radius: var(--radius-sm); }
#sidebar::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, rgb(255 255 255 / 60%), rgb(255 255 255 / 32%)); }

.sb-content {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 11px;
    overflow: hidden;
}

.sb-col {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 11px;
    overflow: hidden;
}

.sb-col--left { border-right: none; }

.sb-panel-wrap {
    position: relative;
    z-index: 5;
    flex: 0 0 auto;
    border-bottom: none;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    box-shadow: var(--glass-shadow-stack);
}

.sb-grow-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
    box-shadow: var(--glass-shadow-stack);
    overflow: hidden;
}

.sec-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
    font-size: 0.6em;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

.sec-title--spaced { margin-bottom: 8px; }

.sec-title__line {
    flex: 1;
    max-width: 40px;
    height: 1px;
    background: var(--line-lt);
    transition: background var(--duration-slow) var(--ease-out), box-shadow var(--duration-slow) var(--ease-out);
}

.panel:hover          .sec-title__line,
.dmg-log-panel:hover  .sec-title__line,
.clans-panel:hover    .sec-title__line,
.playback-panel:hover .sec-title__line,
.roster-panel:hover   .sec-title__line {
    background: rgb(var(--color-accent-rgb) / 45%);
}

.sb-header {
    height: 46px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 20px;
    overflow: hidden;
    background: transparent;
    border-bottom: none;
}

.sb-header__map-name {
    font-size: 1.05em !important;
    font-weight: 700 !important;
}

.sb-header__split {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
}

.sb-header__map-name {
    flex: 0 0 100%;
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85em;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: flex-basis 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                max-width 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                padding-left 2.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.sb-header__split.has-capture .sb-header__map-name {
    flex: 0 0 25%;
    max-width: 25%;
    padding-left: 10px;
    border-left: 1px solid var(--line);
}

.sb-header__capture {
    position: relative;
    flex: 0 0 0%;
    max-width: 0%;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    opacity: 0;
    transition: flex-basis 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                max-width 2.5s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 1.2s ease 0.3s;
}

.sb-header__split.has-capture .sb-header__capture {
    flex: 1 1 75%;
    max-width: 75%;
    padding-right: 10px;
    opacity: 1;
}

.sb-header__capture.lines-2 .capture-line { flex: 1 1 50%; }
.sb-header__capture.lines-1 .capture-line { flex: 1 1 100%; }

.sb-header__capture.is-finishing .capture-line {
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.55, 0, 1, 0.45), opacity 0.4s ease;
}

.sb-header__capture.is-finishing .capture-line:nth-child(odd)  { transform: translateX(-18px); opacity: 0; }
.sb-header__capture.is-finishing .capture-line:nth-child(even) { transform: translateX(18px);  opacity: 0; }

.sb-finish-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}

.sb-finish-overlay.is-active { pointer-events: auto; }

.sb-finish-overlay__text {
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 1.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s,
                transform 1.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
}

.sb-finish-overlay.is-active .sb-finish-overlay__text {
    opacity: 1;
    transform: scale(1);
}

.sb-finish-overlay__text.win  { color: var(--team1); }
.sb-finish-overlay__text.lose { color: var(--team2); }

.capture-line {
    position: relative;
    min-height: 0;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    grid-template-rows: auto auto;
    column-gap: 10px;
    row-gap: 1px;
    padding-top: 3px;
}

.sb-header__capture.lines-2 .capture-line:first-child::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -4px;
    height: 1px;
    background: var(--line);
    opacity: 0.6;
}

.capture-line__name {
    grid-column: 1;
    grid-row: 1 / 3;
    align-self: center;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    white-space: nowrap;
}

.capture-line__bar {
    grid-column: 2;
    grid-row: 1 / 3;
    align-self: center;
    position: relative;
    width: 100%;
    border-radius: var(--radius-sm);
    background: var(--line);
    overflow: hidden;
    box-shadow: var(--shadow-inset);
}

.capture-line__bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    border-radius: var(--radius-sm);
    background: var(--line-lt);
    transition: width 0.15s linear, background-color 0.25s ease;
}

.capture-line__bar-fill.capturing-us    { background: var(--team1); }
.capture-line__bar-fill.capturing-enemy { background: var(--team2); }

.capture-line__percent {
    grid-column: 3;
    grid-row: 1 / 3;
    align-self: center;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--text-dim);
    white-space: nowrap;
    transition: color 0.25s ease;
}

.capture-line__percent.capturing-us    { color: var(--team1); }
.capture-line__percent.capturing-enemy { color: var(--team2); }

.capture-line__timer {
    grid-column: 4;
    grid-row: 1;
    justify-self: end;
    align-self: end;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
}

.capture-line__clock-icon {
    flex-shrink: 0;
    display: block;
    object-fit: contain;
    opacity: 0.9;
}

.capture-line__meta {
    grid-column: 4;
    grid-row: 2;
    justify-self: end;
    align-self: start;
    display: flex;
    align-items: center;
    gap: 4px;
}

.capture-line__tank-icon {
    width: auto;
    display: block;
    flex-shrink: 0;
    object-fit: contain;
}

.capture-line__players {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1;
}

.capture-line.size-lg { column-gap: 14px; }
.capture-line.size-lg .capture-line__bar         { height: 10px; }
.capture-line.size-lg .capture-line__name        { font-size: 0.82em; }
.capture-line.size-lg .capture-line__percent     { font-size: 1.15em; }
.capture-line.size-lg .capture-line__timer       { font-size: 0.82em; }
.capture-line.size-lg .capture-line__clock-icon  { width: 9px; height: 11px; }
.capture-line.size-lg .capture-line__tank-icon   { height: 17px; margin: -2px -3px; }
.capture-line.size-lg .capture-line__players     { font-size: 0.78em; }

.capture-line.size-sm { column-gap: 10px; }
.capture-line.size-sm .capture-line__bar         { height: 5px; }
.capture-line.size-sm .capture-line__name        { font-size: 0.66em; }

.clans-panel {

.alive-count {

.alive-count.ally {

.score-separator { color: var(--text-muted); font-weight: 700; }

.hp-bars {

    z-index: 1;
    display: flex;

    gap: 8px;
}

.hp-value {

    font-size: 1.1em;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
}

.hp-value.ally  { color: var(--team1); }
.hp-value.enemy { color: var(--team2); }

.hp-track {

    position: relative;
    display: flex;

.hp-track.enemy { justify-content: flex-start; }

.hp-track.ally::before  { background: linear-gradient(90deg, rgb(var(--team1-rgb) / 55%) 0%, rgb(var(--team1-rgb) / 0%) 100%); }
.hp-track.enemy::before { background: linear-gradient(90deg, rgb(var(--team2-rgb) / 0%) 0%, rgb(var(--team2-rgb) / 55%) 100%); }

.hp-track__fill {
    position: relative;
    z-index: 1;
    flex-shrink: 0;
    height: 100%;
    border-radius: var(--radius-full);

}

.hp-track__fill::after {
    content: '';
    position: absolute;
    inset: 0 0 55% 0;
    border-radius: var(--radius-full) var(--radius-full) 0 0;

}

.hp-track__fill.team-ally  {

}
.hp-track__fill.team-enemy {

}

.playback-panel {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 14px 20px 12px;
}

.timeline {
    position: relative;
    height: 24px;
    width: 100%;
    display: flex;
    align-items: center;
}

.timeline input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    position: relative;
    z-index: 2;
    width: 100%;
    height: 24px;
    margin: 0;
    background: transparent;
    outline: none;
    cursor: pointer;
}

.timeline input[type="range"]::-webkit-slider-runnable-track {
    width: 100%;
    height: 4px;
    border-radius: var(--radius-full);
    background:
        linear-gradient(to right,
            #3ddc6d 0%, #3ddc6d var(--progress, 0%),
            rgb(255 255 255 / 12%) var(--progress, 0%), rgb(255 255 255 / 12%) 100%);
}

.timeline input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    margin-top: -6px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 30% 24%, rgb(255 255 255 / 95%) 0%, rgb(255 255 255 / 55%) 45%, rgb(225 228 232 / 40%) 100%),
        linear-gradient(160deg, rgb(255 255 255 / 88%), rgb(206 208 214 / 78%));
    border: 1px solid rgb(255 255 255 / 55%);
    cursor: pointer;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    box-shadow:
        0 2px 8px rgb(0 0 0 / 38%),
        0 0 0 1px rgb(255 255 255 / 10%),
        inset 0 1px 1px rgb(255 255 255 / 85%),
        inset 0 -3px 4px rgb(0 0 0 / 12%);
    transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    will-change: transform;
}

.timeline input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
}

.timeline input[type="range"]::-moz-range-track {
    width: 100%;
    height: 4px;
    border-radius: var(--radius-full);
    background:
        linear-gradient(to right,
            #3ddc6d 0%, #3ddc6d var(--progress, 0%),
            rgb(255 255 255 / 12%) var(--progress, 0%), rgb(255 255 255 / 12%) 100%);
}

.timeline input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 30% 24%, rgb(255 255 255 / 95%) 0%, rgb(255 255 255 / 55%) 45%, rgb(225 228 232 / 40%) 100%),
        linear-gradient(160deg, rgb(255 255 255 / 88%), rgb(206 208 214 / 78%));
    border: 1px solid rgb(255 255 255 / 55%);
    cursor: pointer;
    backdrop-filter: blur(14px) saturate(180%);
    box-shadow:
        0 2px 8px rgb(0 0 0 / 38%),
        0 0 0 1px rgb(255 255 255 / 10%),
        inset 0 1px 1px rgb(255 255 255 / 85%),
        inset 0 -3px 4px rgb(0 0 0 / 12%);
    transition: transform 0.15s ease;
}

.timeline input[type="range"]::-moz-range-thumb:hover { transform: scale(1.15); }

.timeline-times {
    display: flex;
    align-items: center;

}

.playback-panel:hover .timeline-times #timeCurrent {

}

.controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: fit-content;
    margin: 0 auto;
    padding: 4px 8px;

    transition: border-color var(--duration-med) var(--ease-out);
}

.controls-row:hover { border-color: rgb(255 255 255 / 10%); }

.scrub-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    border: 1px solid rgb(255 255 255 / 8%);
    border-radius: 50%;
    cursor: pointer;
    transition: background var(--duration-med) var(--ease-out), border-color var(--duration-med) var(--ease-out), color var(--duration-med) var(--ease-out), scale var(--duration-fast) var(--ease-out);
}
.scrub-btn:hover {
    background: rgba(255, 255, 255, 0.09);
    color: var(--text);

}
.scrub-btn:active { scale: 0.9; }
.scrub-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

.scrub-icon.spin-ccw { animation: spin-ccw 0.32s ease-out 1; }

@keyframes spin-ccw { to { transform: rotate(-360deg); } }
@keyframes spin-cw  { to { transform: rotate(360deg); } }

.play-btn {
    position: relative;
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border: 1px solid rgb(255 255 255 / 14%);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgb(0 0 0 / 30%), inset 0 1px 0 rgb(255 255 255 / 16%);
    cursor: pointer;
    transition: background var(--duration-med) var(--ease-out), border-color var(--duration-med) var(--ease-out), color var(--duration-med) var(--ease-out), scale var(--duration-fast) var(--ease-out);
}

.play-btn svg {
    position: absolute;
    transition: opacity 0.15s cubic-bezier(0.2, 0, 0, 1), scale 0.15s cubic-bezier(0.2, 0, 0, 1), filter 0.15s cubic-bezier(0.2, 0, 0, 1);

.play-btn .icon-play  { opacity: 1; scale: 1;    filter: blur(0); }

.play-btn.is-active .icon-pause { opacity: 1; scale: 1;    filter: blur(0); }

.play-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgb(255 255 255 / 20%);
}

.play-btn:active { scale: 0.92; }

.play-btn:focus-visible,
.speed-control__btn:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
}

.speed-control {
    position: relative;
    flex-shrink: 0;
    margin-left: 2px;
}

.speed-control__btn {
    height: 34px;
    padding: 0 24px 0 16px;
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    border: 1px solid rgb(255 255 255 / 8%);
    border-radius: var(--radius-full);

    background-repeat: no-repeat;
    background-position: right 12px center;
    transition: color var(--duration-med) var(--ease-out), background-color var(--duration-med) var(--ease-out), border-color var(--duration-med) var(--ease-out);

.speed-control__btn:active { scale: 0.96; }

.speed-control__dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    min-width: 88px;
    z-index: 200;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    padding: 4px;

    backdrop-filter: blur(var(--glass-blur)) saturate(180%);

    pointer-events: none;
    transition: max-height 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
}

.speed-control__dropdown.is-open {
    max-height: 200px;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
}

.speed-control__option {
    padding: 8px 12px;
    border-radius: var(--radius-md);
    font-family: var(--font-mono);
    font-size: 0.75em;
    font-weight: 400;

.speed-control__option:hover     { background: rgb(255 255 255 / 10%); color: var(--text); }
.speed-control__option:active    { scale: 0.96; }
.speed-control__option.is-selected { color: var(--color-accent); font-weight: 600; }


.roster-panel {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 14px 10px;
}

.team-filter {
    position: relative;
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    padding: 4px;
    background: rgba(0, 0, 0, 0.18);
    border-radius: var(--radius-full);
    border: 1px solid rgb(255 255 255 / 5%);

    z-index: 1;

    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    box-shadow: none;
    cursor: pointer;

.team-filter__btn:hover  { color: var(--text-secondary); }
.team-filter__btn:active { scale: 0.96; }

.team-filter__btn.is-active { color: var(--text); }

.player-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow: hidden;
}

.player-row {
    position: relative;
    flex: 1;
    flex-shrink: 0;
    min-height: 0;

    align-items: center;
    gap: 10px;
    padding: 3px 10px 3px 4px;

.player-row::before {

    flex-shrink: 0;
    align-self: center;
    width: 3px;
    height: 95%;
    border-radius: var(--radius-full);
    background: var(--team-color, var(--line-lt));
    transition: opacity 0.14s;

.player-row:nth-child(odd)  { background: rgba(255, 255, 255, 0.018); }
.player-row:nth-child(even) { background: rgba(255, 255, 255, 0.036); }

.player-row::after {

.player-row__icon {

.player-row__icon img {

.player-row__icon-placeholder { width: 80px; height: 24px; }

.player-row__info {

.player-row__nick {

.player-row__aside {

.player-row__values {

.player-row__dmg {

.player-row__hp {

.player-row__status {

.dmg-log-panel {
    flex: 1;
    min-height: 0;
    display: flex;

    overflow: hidden;
    padding: 14px 16px 12px;

const markerImages = {};
function loadMarkerImages() {
    if (!DATA.markers || !DATA.markers.length) { drawBackground(); draw(); return; }

    let loaded = 0;
    uniqueIcons.forEach(iconName => {

    });
}

    DATA.players.forEach(p => { if (p.tank_code) uniqueCodes.add(p.tank_code); });
    if (uniqueCodes.size === 0) return;
    let loaded = 0;
    uniqueCodes.forEach(code => {
        const img = new Image();
        img.onload = () => { loaded++; if (loaded === uniqueCodes.size) draw(); };

        img.src = `${CONFIG.ICONS_PATH}${code.replace(/:/g, '-')}.png`;
        tankIconImages[code] = img;

        if (t - list[i].time > 5) break;
    }
    if (result && (t - result.time) > 2.5) return null;
    return result;
}

let captureRevealed = false;

const FINISH_DELAY_AFTER_EVENT = 1;
let finishOverlayShown = false;

function computeFinishMessage(weWon) {
    const reasonCode = DATA.finish_reason_code;
    let text;
    if (reasonCode === 2) {
        text = 'База захвачена';
    } else if (reasonCode === 1) {
        text = weWon ? 'Вся техника противника уничтожена' : 'Вся техника союзников уничтожена';
    } else {
        text = weWon ? 'Победа' : 'Поражение';
    }
    return { text, cls: weWon ? 'win' : 'lose' };
}

function computeFinishEventTime() {
    const reasonCode = DATA.finish_reason_code;
    const weWon = DATA.winner_team != null && parseInt(DATA.winner_team, 10) === MY_TEAM;
    const losingTeam = weWon ? (MY_TEAM === 1 ? 2 : 1) : MY_TEAM;

    if (reasonCode === 2) {
        const fullCaptures = CAPTURE_TIMELINE.filter(c => (c.percent ?? 0) >= 100);
        if (fullCaptures.length) return { time: fullCaptures[0].time, weWon };
    } else if (reasonCode === 1) {
        let lastDeathTime = null;
        (DATA.damage_events || []).forEach(ev => {
            if (!ev.is_destroyed) return;
            const targetPlayer = playerMap.get(ev.target);
            if (!targetPlayer || targetPlayer.team !== losingTeam) return;
            if (lastDeathTime === null || ev.time > lastDeathTime) lastDeathTime = ev.time;
        });
        if (lastDeathTime !== null) return { time: lastDeathTime, weWon };
    }

    return { time: Math.max(0, (maxTime || 0) - 5), weWon };
}

let finishComputed = null;

function triggerFinishOverlay(weWon) {
    if (finishOverlayShown) return;
    finishOverlayShown = true;


    if (headerSplitEl) headerSplitEl.classList.add('has-capture');
    if (captureIndicatorEl) captureIndicatorEl.classList.add('is-finishing');

    const msg = computeFinishMessage(weWon);
    finishTextEl.textContent = msg.text;
    finishTextEl.classList.remove('win', 'lose');
    finishTextEl.classList.add(msg.cls);


    finishOverlayEl.classList.add('is-active');
}

function resetFinishOverlay() {
    finishOverlayShown = false;
    if (captureIndicatorEl) captureIndicatorEl.classList.remove('is-finishing');
    if (finishOverlayEl) finishOverlayEl.classList.remove('is-active');
}

function updateFinishOverlay() {
    if (!finishOverlayEl) return;
    if (!finishComputed) finishComputed = computeFinishEventTime();

    const showAt = finishComputed.time + FINISH_DELAY_AFTER_EVENT;
    const shouldShow = currentTime >= showAt;

    if (shouldShow && !finishOverlayShown) {
        triggerFinishOverlay(finishComputed.weWon);
    } else if (!shouldShow && finishOverlayShown) {

        resetFinishOverlay();
    }
}

function updateCaptureIndicator() {
    updateFinishOverlay();

    if (!headerSplitEl || !HAS_ANY_CAPTURE) return;

    if (!captureRevealed && currentTime >= CAPTURE_REVEAL_TIME) {
        captureRevealed = true;
        headerSplitEl.classList.add('has-capture');
    }
    if (!captureRevealed) return;

    captureLineEls.forEach((els, baseIndex) => {
        const cap = captureAtTimeForBase(currentTime, baseIndex);

        els.fillEl.classList.remove('capturing-us', 'capturing-enemy');
        els.percentEl.classList.remove('capturing-us', 'capturing-enemy');

        if (!cap) {
            els.fillEl.style.width = '0%';
            els.percentEl.textContent = '0%';
            els.timerTextEl.textContent = '00:00';
            els.playersEl.textContent = '0';
            return;
        }

        const cls = WE_ARE_ATTACKING ? 'capturing-us' : 'capturing-enemy';
        const pct = Math.max(0, Math.min(100, cap.percent));

        els.fillEl.style.width = `${pct}%`;
        els.fillEl.classList.add(cls);
        els.percentEl.textContent = `${Math.round(pct)}%`;
        els.percentEl.classList.add(cls);
        els.timerTextEl.textContent = formatCaptureClock(cap.seconds_remaining);
        els.playersEl.textContent = String(cap.players_capturing ?? 0);
    });
}

let maxTime = DATA.duration_sec || 0;
let currentTime = 0;
let isPlaying = false;
let playerFilter = 'all';
let zoom = 1;
let panX = 0;
let panY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let lastFrameTime = null;

const mapFilters = { paths: true, shots: true, damage: true, deaths: true, nicknames: true, tankNames: false, tankIcons: false };
const visibility = {};
const deadSet = new Set();
const deathTimeMap = new Map();

const positionIndex = {};

function buildPositionIndex() {
    for (const pid in DATA.positions) {
        positionIndex[pid] = { pts: DATA.positions[pid] };
    }
}

function getLastPtAtTime(pid, t) {
    const idx = positionIndex[pid];
    if (!idx) return null;
    const pts = idx.pts;
    let lo = 0, hi = pts.length - 1, result = null;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (pts[mid].t <= t) { result = pts[mid]; lo = mid + 1; }
        else hi = mid - 1;
    }
    return result;
}

function getPathUpToTime(pid, t) {
    const idx = positionIndex[pid];
    if (!idx) return [];
    const pts = idx.pts;
    let lo = 0, hi = pts.length - 1, end = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (pts[mid].t <= t) { end = mid; lo = mid + 1; }
        else hi = mid - 1;
    }
    return end < 0 ? [] : pts.slice(0, end + 1);
}

let hpSnapshots = [];

function buildHpSnapshots() {
    const currentHp = {};
    DATA.players.forEach(p => { currentHp[p.id] = p.max_hp; });

    let totalHp1 = 0, totalHp2 = 0, initHp1 = 0, initHp2 = 0;
    DATA.players.forEach(p => {
        if (p.team === 1) { totalHp1 += p.max_hp; initHp1 += p.max_hp; }
        else { totalHp2 += p.max_hp; initHp2 += p.max_hp; }
    });

    const sortedEvents = [...DATA.damage_events].sort((a, b) => a.time - b.time);
    hpSnapshots = [{ t: -Infinity, hp1: totalHp1, hp2: totalHp2, initHp1, initHp2 }];

    sortedEvents.forEach(ev => {
        const prevHp = currentHp[ev.target];
        if (prevHp === undefined) return;

        let newHp;
        if (ev.new_hp !== undefined && ev.new_hp !== null) {
            newHp = Math.max(0, ev.new_hp);
        } else if (ev.damage > 0) {
            newHp = Math.max(0, prevHp - ev.damage);
        } else {
            return;
        }

        const delta = newHp - prevHp;
        currentHp[ev.target] = newHp;

        const pInfo = playerMap.get(ev.target);
        if (!pInfo) return;
        if (pInfo.team === 1) totalHp1 = Math.max(0, totalHp1 + delta);
        else totalHp2 = Math.max(0, totalHp2 + delta);

        hpSnapshots.push({ t: ev.time, hp1: totalHp1, hp2: totalHp2, initHp1, initHp2 });
    });
}

function getHpAtTime(t) {
    let lo = 0, hi = hpSnapshots.length - 1, result = hpSnapshots[0];
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (hpSnapshots[mid].t <= t) { result = hpSnapshots[mid]; lo = mid + 1; }
        else hi = mid - 1;
    }
    return result;
}

const playerDamageTimeline = new Map();

function buildPlayerDamageTimelines() {
    DATA.players.forEach(p => { playerDamageTimeline.set(p.id, [{ t: -Infinity, cumDmg: 0 }]); });
    const sortedEvents = [...DATA.damage_events].sort((a, b) => a.time - b.time);
    sortedEvents.forEach(ev => {
        if (ev.damage <= 0) return;
        const timeline = playerDamageTimeline.get(ev.attacker);
        if (!timeline) return;
        const prevCum = timeline[timeline.length - 1].cumDmg;
        timeline.push({ t: ev.time, cumDmg: prevCum + ev.damage });
    });
}

function getPlayerDamageAtTime(pid, t) {
    const timeline = playerDamageTimeline.get(pid);
    if (!timeline) return 0;
    let lo = 0, hi = timeline.length - 1, result = timeline[0];
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (timeline[mid].t <= t) { result = timeline[mid]; lo = mid + 1; }
        else hi = mid - 1;
    }
    return result.cumDmg;
}

function getDestroyedAtTime(t) {
    const ids = new Set(
        DATA.damage_events
            .filter(ev => ev.is_destroyed && ev.time <= t)
            .map(ev => ev.target)
    );
    DATA.deaths.forEach(d => { if (d.t <= t) ids.add(d.pid); });
    return ids;
}

const pathCache = new Map();
let pathCacheTime = -1;

function invalidatePathCache() { pathCacheTime = -1; }

function getPlayerPath(pid, t) {
    const cached = pathCache.get(pid);
    if (cached && cached.time === t) return cached;

    const pts = getPathUpToTime(pid, t);
    let path2d = null;
    if (pts.length > 0) {
        path2d = new Path2D();
        path2d.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) path2d.lineTo(pts[i].x, pts[i].y);
    }
    const lastPt = pts.length > 0 ? pts[pts.length - 1] : null;
    const result = { time: t, path2d, lastPt };
    pathCache.set(pid, result);
    return result;
}

function buildPlayerTimelines() {
    const timelines = new Map();
    for (const player of DATA.players) {
        timelines.set(player.id, { checkpoints: [{ t: -Infinity, hp: player.max_hp, dead: false }] });
    }
    const sortedEvents = [...DATA.damage_events].sort((a, b) => a.time - b.time);
    for (const ev of sortedEvents) {
        const timeline = timelines.get(ev.target);
        if (!timeline) continue;
        const prevHp = timeline.checkpoints[timeline.checkpoints.length - 1].hp;
        let hp = prevHp;
        if (ev.new_hp !== undefined && ev.new_hp !== null) {
            hp = Math.max(0, ev.new_hp);
        } else if (ev.damage > 0) {
            hp = Math.max(0, prevHp - ev.damage);
        } else if (!ev.is_destroyed) {
            continue;
        }
        timeline.checkpoints.push({ t: ev.time, hp, dead: ev.is_destroyed || hp <= 0 });
    }
    for (const d of DATA.deaths) {
        const timeline = timelines.get(d.pid);
        if (timeline && !timeline.checkpoints[timeline.checkpoints.length - 1].dead) {
            timeline.checkpoints.push({ t: d.t, hp: 0, dead: true });
        }
    }
    return timelines;
}

function checkpointAt(checkpoints, time) {
    let lo = 0, hi = checkpoints.length - 1, result = checkpoints[0];
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (checkpoints[mid].t <= time) { result = checkpoints[mid]; lo = mid + 1; }
        else hi = mid - 1;
    }
    return result;
}

const playerTimelines = buildPlayerTimelines();

function getPlayerStateAtTime(id, t) {
    const timeline = playerTimelines.get(id);
    return timeline ? checkpointAt(timeline.checkpoints, t) : { hp: 0, dead: false };
}

let lastUIUpdate = -1;
const UI_UPDATE_INTERVAL = 0.1;

function shouldUpdateUI() {
    if (Math.abs(currentTime - lastUIUpdate) >= UI_UPDATE_INTERVAL || !isPlaying) {
        lastUIUpdate = currentTime;
        return true;
    }
    return false;
}

function updateHPBars() {
    const snap = getHpAtTime(currentTime);
    const allyTeam = MY_TEAM;
    const enemyTeam = MY_TEAM === 1 ? 2 : 1;
    const allyHP = allyTeam === 1 ? snap.hp1 : snap.hp2;
    const enemyHP = enemyTeam === 1 ? snap.hp1 : snap.hp2;
    const allyInit = allyTeam === 1 ? snap.initHp1 : snap.initHp2;
    const enemyInit = enemyTeam === 1 ? snap.initHp1 : snap.initHp2;

    const destroyedIds = getDestroyedAtTime(currentTime);
    let allyKills = 0, enemyKills = 0;
    DATA.players.forEach(p => {
        if (destroyedIds.has(p.id)) {
            if (isAlly(p.team)) enemyKills++; else allyKills++;
        }
    });

    document.getElementById('hpValAlly').textContent = allyHP.toLocaleString();
    document.getElementById('hpValEnemy').textContent = enemyHP.toLocaleString();
    document.getElementById('hpBarAlly').style.width = (allyInit > 0 ? allyHP / allyInit * 100 : 0).toFixed(1) + '%';
    document.getElementById('hpBarEnemy').style.width = (enemyInit > 0 ? enemyHP / enemyInit * 100 : 0).toFixed(1) + '%';
    document.getElementById('allyAlive').textContent = allyKills;
    document.getElementById('enemyAlive').textContent = enemyKills;
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const ss = Math.floor(s % 60);
    return `${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
}

function updateProgress() {
    slider.style.setProperty('--progress', (maxTime > 0 ? currentTime / maxTime * 100 : 0) + '%');
    updateCaptureIndicator();
}

function updateTime() {
    document.getElementById('timeCurrent').textContent = formatTime(currentTime);
    document.getElementById('timeTotal').textContent = formatTime(maxTime);
}

let lastRenderedEventIndex = 0;

function renderDmgLog() {
    const sorted = DATA.damage_events;
    let end = 0;
    let lo = 0, hi = sorted.length - 1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (sorted[mid].time <= currentTime) { end = mid + 1; lo = mid + 1; }
        else hi = mid - 1;
    }

    if (end === lastRenderedEventIndex) return;

    if (end < lastRenderedEventIndex) {
        dmgLogEl.innerHTML = '';
        lastRenderedEventIndex = 0;
    }

    const fragment = document.createDocumentFragment();
    for (let i = lastRenderedEventIndex; i < end; i++) {
        const ev = sorted[i];
        const entry = buildDmgLogEntry(ev);
        fragment.insertBefore(entry, fragment.firstChild);
    }
    dmgLogEl.insertBefore(fragment, dmgLogEl.firstChild);
    lastRenderedEventIndex = end;
}

function buildDmgLogEntry(ev) {
    const atk = playerMap.get(ev.attacker);
    const tgt = playerMap.get(ev.target);
    const atkClass = atk ? (isAlly(atk.team) ? 'ally' : 'enemy') : '';
    const tgtClass = tgt ? (isAlly(tgt.team) ? 'ally' : 'enemy') : '';
    const atkShort = atk ? atk.name.split('[')[0].trim() : ev.attacker;
    const tgtShort = tgt ? tgt.name.split('[')[0].trim() : ev.target;

    const div = document.createElement('div');
    div.className = 'dmg-entry' + (ev.is_destroyed ? ' destroyed' : '');

    const timeTag = document.createElement('span');
    timeTag.className = 'time-tag';
    timeTag.textContent = `[${formatTime(ev.time)}]`;
    div.appendChild(timeTag);

    const atkSpan = document.createElement('span');
    atkSpan.className = 'attacker-name ' + atkClass;
    atkSpan.textContent = atkShort;
    div.appendChild(atkSpan);

    if (ev.is_destroyed) {
        const killClass = atk && isAlly(atk.team) ? 'ally-kill' : 'enemy-kill';
        div.className = 'dmg-entry destroyed ' + killClass;

        div.appendChild(document.createTextNode(' уничтожил '));
        const tgtSpan = document.createElement('span');
        tgtSpan.className = 'target-name ' + tgtClass;
        tgtSpan.textContent = tgtShort;
        div.appendChild(tgtSpan);

        const icon = document.createElement('span');
        icon.className = 'kill-icon';
        icon.textContent = '☠';
        div.appendChild(icon);
    } else {
        div.appendChild(document.createTextNode(' → '));
        const tgtSpan = document.createElement('span');
        tgtSpan.className = 'target-name ' + tgtClass;
        tgtSpan.textContent = tgtShort;
        div.appendChild(tgtSpan);

        const dmgClass = atk && isAlly(atk.team) ? 'ally-damage' : 'enemy-damage';
        const dmgSpan = document.createElement('span');
        dmgSpan.className = 'dmg-value ' + dmgClass;
        const displayDmg = (ev.damage === 0 && ev.is_destroyed && ev.old_hp > 0) ? ev.old_hp : ev.damage;
        dmgSpan.textContent = `−${displayDmg}`;
        div.appendChild(document.createTextNode(' '));
        div.appendChild(dmgSpan);
    }

    return div;
}

const activeLines = [];
const activePopups = [];
let lineIdCounter = 0;

function triggerAttackLine(attackerPt, targetPt, damage, targetId) {
    const id = ++lineIdCounter;
    activeLines.push({ id, attackerPt, targetPt, damage, targetId, startTime: currentTime, duration: CONFIG.POPUP_DURATION });
}

function updateAttackLines() {
    for (let i = activeLines.length - 1; i >= 0; i--) {
        if (currentTime - activeLines[i].startTime > activeLines[i].duration) activeLines.splice(i, 1);
    }
}

function drawAttackLines() {
    if (!mapFilters.shots) return;
    activeLines.forEach(line => {
        fgCtx.save();
        fgCtx.strokeStyle = '#a855f7';
        fgCtx.lineWidth = 2.8 / zoom;
        fgCtx.setLineDash([6 / zoom, 4 / zoom]);
        fgCtx.globalAlpha = 0.9;
        fgCtx.beginPath();
        fgCtx.moveTo(line.attackerPt.x, line.attackerPt.y);
        fgCtx.lineTo(line.targetPt.x, line.targetPt.y);
        fgCtx.stroke();
        fgCtx.restore();
    });
}

function updateSinglePopupPosition(popup) {
    const rect = fgCanvas.getBoundingClientRect();
    const wrapRect = fgCanvas.parentElement.getBoundingClientRect();
    const canvasW = rect.width;
    const canvasH = rect.height;
    const centerX = CONFIG.CANVAS_W / 2;
    const centerY = CONFIG.CANVAS_H / 2;
    const screenX = (popup.targetPt.x - centerX) * zoom + centerX + panX;
    const screenY = (popup.targetPt.y - centerY) * zoom + centerY + panY;
    const pixelX = (screenX / CONFIG.CANVAS_W) * canvasW + (rect.left - wrapRect.left);
    const pixelY = (screenY / CONFIG.CANVAS_H) * canvasH + (rect.top - wrapRect.top);
    popup.element.style.left = (pixelX - 18) + 'px';
    popup.element.style.top = (pixelY - 28) + 'px';
    const elapsed = currentTime - popup.startTime;
    popup.element.style.transform = `translateY(${-Math.min(elapsed * 18, 24)}px)`;
}

function showDamagePopup(attackerPt, targetPt, damage, targetId, oldHp) {
    if (!mapFilters.damage) return;
    const el = document.createElement('div');
    el.className = 'dmg-popup';
    const displayDmg = (damage === 0 && oldHp > 0) ? oldHp : damage;
    el.textContent = `−${displayDmg}`;

    const targetPlayer = playerMap.get(targetId);
    const isFriendlyFire = targetPlayer && isAlly(targetPlayer.team);
    el.style.color = isFriendlyFire ? CONFIG.TEAM1_COLOR : '#ff4444';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    popupsLayer.appendChild(el);

    const popupData = { element: el, targetPt, startTime: currentTime, duration: CONFIG.POPUP_DURATION };
    activePopups.push(popupData);
    updateSinglePopupPosition(popupData);
}

function updatePopups() {
    for (let i = activePopups.length - 1; i >= 0; i--) {
        const popup = activePopups[i];
        const elapsed = currentTime - popup.startTime;
        updateSinglePopupPosition(popup);
        if (elapsed > popup.duration) {
            popup.element.remove();
            activePopups.splice(i, 1);
        } else if (elapsed > popup.duration * 0.7) {
            const fadeProgress = (elapsed - popup.duration * 0.7) / (popup.duration * 0.3);
            popup.element.style.opacity = (1 - fadeProgress).toFixed(2);
        }
    }
}

const triggeredEvents = new Set();

function checkDamageEvents() {
    DATA.damage_events.forEach((ev, idx) => {
        if (ev.time > currentTime || ev.time < currentTime - 1.5) return;
        if (triggeredEvents.has(idx)) return;

        const atkPt = getLastPtAtTime(ev.attacker, ev.time);
        const tgtPt = getLastPtAtTime(ev.target, ev.time);
        if (!atkPt || !tgtPt) return;

        triggeredEvents.add(idx);
        triggerAttackLine(atkPt, tgtPt, ev.damage, ev.target);
        showDamagePopup(atkPt, tgtPt, ev.damage, ev.target, ev.old_hp || 0);
    });
}

function resetTriggeredEvents() {
    triggeredEvents.clear();
    activeLines.length = 0;
    activePopups.forEach(p => p.element.remove());
    activePopups.length = 0;
    lastRenderedEventIndex = 0;
    dmgLogEl.innerHTML = '';
    invalidatePathCache();
}

function init() {
    CONFIG.CANVAS_W = DATA.canvas_w || 1000;
    CONFIG.CANVAS_H = DATA.canvas_h || 1000;

    bgCanvas.width = CONFIG.CANVAS_W;
    bgCanvas.height = CONFIG.CANVAS_H;
    fgCanvas.width = CONFIG.CANVAS_W;
    fgCanvas.height = CONFIG.CANVAS_H;

    document.documentElement.style.setProperty('--map-w', CONFIG.CANVAS_W);
    document.documentElement.style.setProperty('--map-h', CONFIG.CANVAS_H);

    for (const pid in DATA.positions) {
        DATA.positions[pid].forEach(pt => { if (pt.t > maxTime) maxTime = pt.t; });
    }
    if (DATA.duration_sec > maxTime) maxTime = DATA.duration_sec;

    DATA.players.forEach(p => { visibility[p.id] = true; });
    DATA.deaths.forEach(d => { deadSet.add(d.pid); });





    DATA.damage_events.forEach(ev => {
        if (!ev.is_destroyed) return;
        const prevTime = deathTimeMap.get(ev.target);
        if (prevTime === undefined || ev.time < prevTime) {
            deathTimeMap.set(ev.target, ev.time);
        }
    });
    DATA.deaths.forEach(d => { if (!deathTimeMap.has(d.pid)) deathTimeMap.set(d.pid, d.t); });

    normalizeDestroyedEvents();
    DATA.damage_events.sort((a, b) => a.time - b.time);

    buildPositionIndex();
    buildHpSnapshots();
    buildPlayerDamageTimelines();

    currentTime = 0.05;
    slider.value = currentTime;
    slider.max = maxTime;
    updateProgress();
    updateTime();
    updateHPBars();
    renderPlayerList();
    renderDmgLog();
    setupZoom();
    loadMarkerImages();
    loadTankIcons();
}

function normalizeDestroyedEvents() {
    const byTarget = new Map();
    DATA.damage_events.forEach(ev => {
        if (!byTarget.has(ev.target)) byTarget.set(ev.target, []);
        byTarget.get(ev.target).push(ev);
    });
    DATA.deaths.forEach(d => {
        const events = byTarget.get(d.pid) || [];
        if (events.some(ev => ev.is_destroyed)) return;
        const last = events[events.length - 1];
        if (last) {
            last.is_destroyed = true;
            last.new_hp = 0;
        } else {
            DATA.damage_events.push({
                time: d.t, damage: 0, is_ricochet: false, is_destroyed: true,
                old_hp: 0, new_hp: 0, attacker: '', target: d.pid,
            });
        }
    });
}

function applyTransform(ctx) {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.translate(CONFIG.CANVAS_W / 2 + panX, CONFIG.CANVAS_H / 2 + panY);
    ctx.scale(zoom, zoom);
    ctx.translate(-CONFIG.CANVAS_W / 2, -CONFIG.CANVAS_H / 2);
}

function drawBackground() {
    bgCtx.setTransform(1, 0, 0, 1, 0, 0);
    bgCtx.clearRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
    applyTransform(bgCtx);

    try {
        if (currentMapImg.complete && currentMapImg.naturalWidth > 0) {
            bgCtx.drawImage(currentMapImg, 0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
        } else {
            bgCtx.fillStyle = '#141a1d';
            bgCtx.fillRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
            bgCtx.strokeStyle = 'rgba(61,75,82,0.08)';
            bgCtx.lineWidth = 1 / zoom;
            bgCtx.beginPath();
            const stepX = CONFIG.CANVAS_W / 20;
            const stepY = CONFIG.CANVAS_H / 20;
            for (let i = 0; i <= CONFIG.CANVAS_W; i += stepX) { bgCtx.moveTo(i, 0); bgCtx.lineTo(i, CONFIG.CANVAS_H); }
            for (let i = 0; i <= CONFIG.CANVAS_H; i += stepY) { bgCtx.moveTo(0, i); bgCtx.lineTo(CONFIG.CANVAS_W, i); }
            bgCtx.stroke();
        }
    } catch (e) {  }

    if (DATA.markers) {
        DATA.markers.forEach(marker => {
            const img = markerImages[marker.icon];
            if (!img || !img.complete || img.naturalWidth === 0) return;
            const size = CONFIG.MARKER_SIZE;
            bgCtx.drawImage(img, marker.x - size / 2, marker.y - size / 2, size, size);
        });
    }
}

function draw() {
    fgCtx.setTransform(1, 0, 0, 1, 0, 0);
    fgCtx.clearRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
    applyTransform(fgCtx);

    drawAttackLines();
    drawPlayerPaths();
    drawPlayerMarkers();
    drawPlayerLabels();
    updateRosterStatuses();
}

function drawPlayerPaths() {
    if (!mapFilters.paths) return;
    for (const pid in DATA.positions) {
        if (!visibility[pid]) continue;
        const pInfo = playerMap.get(pid);
        if (!pInfo) continue;
        const { path2d } = getPlayerPath(pid, currentTime);
        if (!path2d) continue;

        fgCtx.strokeStyle = playerColor(pInfo);
        fgCtx.lineWidth = 2.5 / zoom;
        fgCtx.lineJoin = 'round';
        fgCtx.lineCap = 'round';
        fgCtx.globalAlpha = 0.65;
        fgCtx.stroke(path2d);
        fgCtx.globalAlpha = 1;
    }
}

function drawPlayerMarkers() {
    for (const pid in DATA.positions) {
        if (!visibility[pid]) continue;
        const pInfo = playerMap.get(pid);
        if (!pInfo) continue;

        const { lastPt } = getPlayerPath(pid, currentTime);

        if (!lastPt) {


            if (isAlly(pInfo.team)) {
                const spawnPt = positionIndex[pid]?.pts?.[0];
                if (spawnPt) {
                    fgCtx.globalAlpha = 0.75;
                    fgCtx.fillStyle = playerColor(pInfo);
                    fgCtx.beginPath();
                    fgCtx.arc(spawnPt.x, spawnPt.y, 4.5 / zoom, 0, Math.PI * 2);
                    fgCtx.fill();
                    fgCtx.strokeStyle = '#141a1d';
                    fgCtx.lineWidth = 1.5 / zoom;
                    fgCtx.stroke();
                    fgCtx.globalAlpha = 1;
                }
            }
            continue;
        }

        const dead = getPlayerStateAtTime(pid, currentTime).dead;
        const color = playerColor(pInfo);
        fgCtx.globalAlpha = 1;

        if (dead && mapFilters.deaths) {
            drawDeathMarker(lastPt, zoom);
        } else if (!dead) {
            fgCtx.fillStyle = color;
            fgCtx.beginPath();
            fgCtx.arc(lastPt.x, lastPt.y, 6 / zoom, 0, Math.PI * 2);
            fgCtx.fill();
            fgCtx.strokeStyle = '#141a1d';
            fgCtx.lineWidth = 2 / zoom;
            fgCtx.stroke();
        }
    }
}

function drawDeathMarker(pt, currentZoom) {
    const crossSize = 10 / currentZoom;
    fgCtx.lineCap = 'round';
    fgCtx.strokeStyle = '#ff0000';
    fgCtx.lineWidth = 4 / currentZoom;
    fgCtx.beginPath();
    fgCtx.moveTo(pt.x - crossSize, pt.y - crossSize);
    fgCtx.lineTo(pt.x + crossSize, pt.y + crossSize);
    fgCtx.moveTo(pt.x + crossSize, pt.y - crossSize);
    fgCtx.lineTo(pt.x - crossSize, pt.y + crossSize);
    fgCtx.stroke();
    fgCtx.strokeStyle = '#ffffff';
    fgCtx.lineWidth = 1.5 / currentZoom;
    fgCtx.beginPath();
    fgCtx.moveTo(pt.x - crossSize, pt.y - crossSize);
    fgCtx.lineTo(pt.x + crossSize, pt.y + crossSize);
    fgCtx.moveTo(pt.x + crossSize, pt.y - crossSize);
    fgCtx.lineTo(pt.x - crossSize, pt.y + crossSize);
    fgCtx.stroke();
}

function drawPlayerLabels() {
    for (const pid in DATA.positions) {
        if (!visibility[pid]) continue;
        const pInfo = playerMap.get(pid);
        if (!pInfo?.name) continue;

        const deathTime = deathTimeMap.has(pid) ? deathTimeMap.get(pid) : Infinity;
        const dead = deathTime <= currentTime;
        if (dead && !mapFilters.deaths) continue;

        const effectiveTime = Math.min(currentTime, deathTime);
        const { lastPt } = getPlayerPath(pid, effectiveTime);
        if (!lastPt) continue;

        const shortName = pInfo.name.split('[')[0];
        const tankName = pInfo.tank_name || '';
        const tankCode = pInfo.tank_code || '';
        const tankImg = tankIconImages[tankCode];
        const hasTankIcon = tankImg && tankImg.complete && tankImg.naturalWidth > 0;

        const baseY = lastPt.y - 6 / zoom;
        const lineHeight = 12 / zoom;
        const iconHeight = 24 / zoom;
        const gap = 1 / zoom;
        const textX = lastPt.x + 11 / zoom;

        const elements = [];
        if (mapFilters.nicknames) elements.push({ type: 'text', text: shortName, height: lineHeight });
        if (mapFilters.tankNames && tankName) elements.push({ type: 'text', text: tankName, height: lineHeight });
        if (mapFilters.tankIcons && hasTankIcon) elements.push({ type: 'icon', img: tankImg, height: iconHeight });
        if (elements.length === 0) continue;

        const totalHeight = elements.reduce((sum, el) => sum + el.height, 0) + (elements.length - 1) * gap;
        let currentY = baseY - totalHeight / 2;
        const textColor = dead ? 'rgba(170,170,170,0.5)' : '#ffffff';
        const strokeColor = dead ? 'rgba(0,0,0,0.45)' : 'rgba(0,0,0,0.7)';
        const strokeWidth = dead ? 1.5 : 2;

        elements.forEach(el => {
            if (el.type === 'text') {
                fgCtx.save();
                fgCtx.font = `bold ${lineHeight}px "Chakra Petch", Arial, sans-serif`;
                fgCtx.textAlign = 'left';
                fgCtx.textBaseline = 'top';
                fgCtx.strokeStyle = strokeColor;
                fgCtx.lineWidth = strokeWidth / zoom;
                fgCtx.strokeText(el.text, textX, currentY);
                fgCtx.fillStyle = textColor;
                fgCtx.fillText(el.text, textX, currentY);
                fgCtx.restore();
            } else if (el.type === 'icon') {
                const iconWidth = el.height * (el.img.naturalWidth / el.img.naturalHeight);
                fgCtx.save();
                fgCtx.globalAlpha = dead ? 0.4 : 1.0;
                fgCtx.drawImage(el.img, textX, currentY, iconWidth, el.height);
                fgCtx.restore();
            }
            currentY += el.height + gap;
        });
    }
}

function updateRosterStatuses() {
    const destroyedNow = getDestroyedAtTime(currentTime);
    DATA.players.forEach(p => {
        const el = document.getElementById('status_' + p.id);
        if (!el) return;
        const dead = destroyedNow.has(p.id) && mapFilters.deaths;
        el.textContent = dead ? '✖' : '';
        el.className = 'player-row__status' + (dead ? ' is-dead' : '');
    });
}

function renderPlayerList() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';

    const sorted = [...DATA.players].sort((a, b) => {
        const ca = isAlly(a.team) ? 0 : 1;
        const cb = isAlly(b.team) ? 0 : 1;
        return ca - cb || a.name.localeCompare(b.name);
    });

    sorted.forEach(p => {
        if (playerFilter === 'ally' && !isAlly(p.team)) return;
        if (playerFilter === 'enemy' && isAlly(p.team)) return;
        list.appendChild(buildPlayerRow(p));
    });

    requestAnimationFrame(() => {
        const listH = list.getBoundingClientRect().height;
        if (listH > 0) {
            const rowHeight = listH / 14;
            list.querySelectorAll('.player-row').forEach(el => { el.style.maxHeight = rowHeight + 'px'; });
        }
    });
}

function buildPlayerRow(p) {
    const color = playerColor(p);
    const visible = visibility[p.id] !== false;
    const isDead = getPlayerStateAtTime(p.id, currentTime).dead;
    const dmg = getPlayerDamageAtTime(p.id, currentTime);
    const shortName = p.name.split('[')[0].trim();
    const tankIconSrc = p.tank_code ? `${CONFIG.ICONS_PATH}${p.tank_code.replace(/:/g, '-')}.png` : '';

    const row = document.createElement('div');
    row.className = 'player-row' + (visible ? '' : ' is-disabled');
    row.style.setProperty('--team-color', color);
    row.dataset.pid = p.id;
    row.setAttribute('role', 'listitem');

    const iconWrap = document.createElement('div');
    iconWrap.className = 'player-row__icon';
    if (tankIconSrc) {
        const img = document.createElement('img');
        img.src = tankIconSrc;
        img.alt = p.tank_name || '';
        img.loading = 'lazy';
        img.onerror = function () { this.style.visibility = 'hidden'; };
        iconWrap.appendChild(img);
    } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'player-row__icon-placeholder';
        iconWrap.appendChild(placeholder);
    }
    row.appendChild(iconWrap);

    const info = document.createElement('div');
    info.className = 'player-row__info';
    const nickSpan = document.createElement('span');
    nickSpan.className = 'player-row__nick';
    nickSpan.textContent = shortName;
    info.appendChild(nickSpan);
    const tankSpan = document.createElement('span');
    tankSpan.className = 'player-row__tank';
    tankSpan.textContent = p.tank_name || '';
    info.appendChild(tankSpan);
    row.appendChild(info);

    const aside = document.createElement('div');
    aside.className = 'player-row__aside';

    const valuesCol = document.createElement('div');
    valuesCol.className = 'player-row__values';

    const dmgSpan = document.createElement('span');
    dmgSpan.className = 'player-row__dmg' + (dmg > 0 ? ' has-damage' : '');
    dmgSpan.id = 'pdmg_' + p.id;
    dmgSpan.textContent = dmg > 0 ? dmg.toLocaleString() : '—';
    valuesCol.appendChild(dmgSpan);

    const hpState = getPlayerStateAtTime(p.id, currentTime);
    const curHp = Math.max(0, Math.round(hpState.hp));
    const maxHp = p.max_hp || 0;
    const hpSpan = document.createElement('span');
    hpSpan.className = 'player-row__hp' + (curHp <= 0 ? ' is-zero' : '');
    hpSpan.id = 'phhp_' + p.id;
    hpSpan.innerHTML = `${maxHp} / <span class="hp-current">${curHp}</span>`;
    valuesCol.appendChild(hpSpan);

    aside.appendChild(valuesCol);

    const statusSpan = document.createElement('span');
    statusSpan.className = 'player-row__status' + (isDead ? ' is-dead' : '');
    statusSpan.id = 'status_' + p.id;
    statusSpan.textContent = isDead ? '✖' : '';
    aside.appendChild(statusSpan);

    row.appendChild(aside);

    row.addEventListener('click', () => {
        visibility[p.id] = !visibility[p.id];
        row.classList.toggle('is-disabled', !visibility[p.id]);
        invalidatePathCache();
        draw();
    });

    return row;
}

function updatePlayerDamages() {
    DATA.players.forEach(p => {
        const dmgEl = document.getElementById('pdmg_' + p.id);
        if (dmgEl) {
            const dmg = getPlayerDamageAtTime(p.id, currentTime);
            dmgEl.textContent = dmg > 0 ? dmg.toLocaleString() : '—';
            dmgEl.className = 'player-row__dmg' + (dmg > 0 ? ' has-damage' : '');
        }

        const hpEl = document.getElementById('phhp_' + p.id);
        if (hpEl) {
            const hpState = getPlayerStateAtTime(p.id, currentTime);
            const curHp = Math.max(0, Math.round(hpState.hp));
            const maxHp = p.max_hp || 0;
            hpEl.innerHTML = `${maxHp} / <span class="hp-current">${curHp}</span>`;
            hpEl.className = 'player-row__hp' + (curHp <= 0 ? ' is-zero' : '');

    });
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function animateViewTo(targetZoom, targetPanX, targetPanY, duration, onDone) {
    const startZoom = zoom, startPanX = panX, startPanY = panY;
    const startTime = performance.now();

    function step(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const e = easeOutCubic(t);
        zoom = startZoom + (targetZoom - startZoom) * e;
        panX = startPanX + (targetPanX - startPanX) * e;
        panY = startPanY + (targetPanY - startPanY) * e;

        document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
        drawBackground();
        draw();
        updatePopups();

        if (t < 1) requestAnimationFrame(step);
        else if (onDone) onDone();
    }
    requestAnimationFrame(step);
}

function resetView() {
    animateViewTo(1, 0, 0, 500);
}

let zoomAnimId = null;

function animateZoomTo(targetZoom, mx, my, duration = 220) {
    targetZoom = Math.max(CONFIG.ZOOM_MIN, Math.min(CONFIG.ZOOM_MAX, targetZoom));

    const halfW = CONFIG.CANVAS_W / 2;
    const halfH = CONFIG.CANVAS_H / 2;


    let worldX = halfW, worldY = halfH;
    if (mx !== undefined) {
        worldX = (mx - halfW - panX) / zoom + halfW;
        worldY = (my - halfH - panY) / zoom + halfH;
    }

    const startZoom = zoom;
    const startTime = performance.now();
    if (zoomAnimId) cancelAnimationFrame(zoomAnimId);

    function step(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const e = easeOutCubic(t);
        zoom = startZoom + (targetZoom - startZoom) * e;

        if (mx !== undefined) {
            panX = mx - halfW - (worldX - halfW) * zoom;
            panY = my - halfH - (worldY - halfH) * zoom;
        }

        document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
        drawBackground();
        draw();
        updatePopups();

        zoomAnimId = t < 1 ? requestAnimationFrame(step) : null;
    }
    zoomAnimId = requestAnimationFrame(step);
}

function setZoom(newZoom, mx, my) {
    newZoom = Math.max(CONFIG.ZOOM_MIN, Math.min(CONFIG.ZOOM_MAX, newZoom));
    const halfW = CONFIG.CANVAS_W / 2;
    const halfH = CONFIG.CANVAS_H / 2;

    if (mx !== undefined) {
        const worldX = (mx - halfW - panX) / zoom + halfW;
        const worldY = (my - halfH - panY) / zoom + halfH;
        zoom = newZoom;
        panX = mx - halfW - (worldX - halfW) * zoom;
        panY = my - halfH - (worldY - halfH) * zoom;
    } else {
        zoom = newZoom;
    }

    document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
    drawBackground();
    draw();
    updatePopups();
}

function setupZoom() {
    document.getElementById('zoomIn').onclick = () => animateZoomTo(zoom * 1.25);
    document.getElementById('zoomOut').onclick = () => animateZoomTo(zoom / 1.25);

    document.getElementById('zoomReset').onclick = () => {
        resetView();
        const icon = document.querySelector('#zoomReset .reset-icon');
        icon.style.animation = 'none';
        icon.offsetWidth;
        icon.style.animation = '';
        icon.classList.add('is-spinning');
        icon.addEventListener('animationend', () => icon.classList.remove('is-spinning'), { once: true });
    };

    fgCanvas.addEventListener('dblclick', resetView);

    let wheelZoomTarget = zoom;
    let wheelMx = 0, wheelMy = 0;
    let wheelRafPending = false;

    fgCanvas.addEventListener('wheel', e => {
        e.preventDefault();
        if (zoomAnimId) { cancelAnimationFrame(zoomAnimId); zoomAnimId = null; }
        if (!wheelRafPending) wheelZoomTarget = zoom;

        wheelZoomTarget = Math.max(CONFIG.ZOOM_MIN, Math.min(CONFIG.ZOOM_MAX, wheelZoomTarget * (e.deltaY > 0 ? 0.9 : 1.1)));
        wheelMx = e.offsetX;
        wheelMy = e.offsetY;

        if (!wheelRafPending) {
            wheelRafPending = true;
            requestAnimationFrame(() => {
                wheelRafPending = false;
                setZoom(wheelZoomTarget, wheelMx, wheelMy);
            });
        }
    }, { passive: false });

    let dragRafPending = false;
    fgCanvas.addEventListener('mousedown', e => {
        isDragging = true;
        dragStartX = e.clientX - panX;
        dragStartY = e.clientY - panY;
    });
    fgCanvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        panX = e.clientX - dragStartX;
        panY = e.clientY - dragStartY;
        if (!dragRafPending) {
            dragRafPending = true;
            requestAnimationFrame(() => {
                dragRafPending = false;
                drawBackground();
                draw();
                updatePopups();
            });
        }
    });
    fgCanvas.addEventListener('mouseup', () => { isDragging = false; });
    fgCanvas.addEventListener('mouseleave', () => { isDragging = false; });
}

function clearTransientPlaybackState() {
    triggeredEvents.clear();
    activeLines.length = 0;
    activePopups.forEach(p => p.element.remove());
    activePopups.length = 0;
    invalidatePathCache();
}

function refreshAllPlaybackUI() {
    updateProgress();
    updateTime();
    updateHPBars();
    renderDmgLog();
    updatePlayerDamages();
    draw();
}

slider.addEventListener('input', () => {
    currentTime = parseFloat(slider.value);
    clearTransientPlaybackState();
    isPlaying = false;
    playBtn.classList.remove('is-active');
    refreshAllPlaybackUI();
    checkDamageEvents();
    updatePopups();
});

function loop(ts) {
    if (!isPlaying) return;
    if (lastFrameTime === null) lastFrameTime = ts;
    const delta = (ts - lastFrameTime) / 1000;
    lastFrameTime = ts;

    const speed = parseFloat(document.getElementById('speedWrapper').dataset.speed ?? '1');
    const prevTime = currentTime;
    currentTime += delta * speed;

    if (currentTime >= maxTime) {
        currentTime = maxTime;
        isPlaying = false;
        playBtn.classList.remove('is-active');
    }


    if (Math.floor(prevTime * 4) !== Math.floor(currentTime * 4)) {
        invalidatePathCache();
    }

    slider.value = currentTime;
    updateProgress();
    updateTime();
    checkDamageEvents();
    updateAttackLines();
    updatePopups();

    if (shouldUpdateUI()) {
        updateHPBars();
        renderDmgLog();
        updatePlayerDamages();
    }

    draw();
    if (isPlaying) requestAnimationFrame(loop);
}

    });
})();

(function initSpeedControl() {
    const wrapper = document.getElementById('speedWrapper');
    const btn = document.getElementById('speedBtn');
    const dropdown = document.getElementById('speedDropdown');
    wrapper.dataset.speed = '1';

    btn.addEventListener('click', e => {
        e.stopPropagation();
        dropdown.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', dropdown.classList.contains('is-open'));
    });

    dropdown.querySelectorAll('.speed-control__option').forEach(opt => {
        opt.addEventListener('click', () => {
            wrapper.dataset.speed = opt.dataset.value;
            btn.textContent = opt.textContent;
            dropdown.querySelectorAll('.speed-control__option').forEach(o => {
                o.classList.remove('is-selected');
                o.setAttribute('aria-selected', 'false');
            });
            opt.classList.add('is-selected');
            opt.setAttribute('aria-selected', 'true');
            dropdown.classList.remove('is-open');
            btn.setAttribute('aria-expanded', 'false');
        });
    });

    document.addEventListener('click', () => {
        dropdown.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
    });
})();

window.addEventListener('resize', () => { drawBackground(); draw(); });

function scrubBy(deltaSeconds) {
    currentTime = Math.min(maxTime, Math.max(0, currentTime + deltaSeconds));
    slider.value = currentTime;
    clearTransientPlaybackState();
    refreshAllPlaybackUI();
}

document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;

    if (e.code === 'Space') {
        e.preventDefault();
        playBtn.click();
    } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        scrubBy(5);
    } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        scrubBy(-5);
    }
});

(function initHitsLink() {
    const link = document.getElementById('hitsLinkBtn');
    if (link && !link.getAttribute('href')) {
        link.classList.add('is-disabled');
    }
})();

mapImgLow.onload = init;
mapImgLow.onerror = init;
if (!"../maps/38_mannerheim_line_low.png") init();
</script>
