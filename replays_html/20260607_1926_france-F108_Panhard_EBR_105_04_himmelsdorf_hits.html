<head>

<title>Визуализатор попаданий</title>
<style>
:root {
--bg: #14171a;
--panel: #1c2024;
--panel-border: #2a2f34;
--text: #e8e6e1;
--text-dim: #8a9099;
--accent: #ff4433;
--accent-dim: #7a2a24;
--mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
--sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; }
html, body {
margin: 0; padding: 0; width: 100%; height: 100%;
background: var(--bg); color: var(--text);
font-family: var(--sans); overflow: hidden;
}
#scene { position: absolute; inset: 0; }
#hud {
position: absolute; top: 0; left: 0; right: 0;
padding: 20px 24px 0 24px;
pointer-events: none;
z-index: 10;
}
#hud h1 {
font-size: 13px; font-weight: 600; letter-spacing: 0.12em;
text-transform: uppercase; color: var(--text-dim); margin: 0 0 2px 0;
}
#hud .subtitle {
font-family: var(--mono); font-size: 12px; color: var(--text-dim);
margin: 0 0 10px 0;
}
#backLink {
display: inline-block;
pointer-events: all;
font-family: var(--mono); font-size: 11px; color: var(--text-dim);
text-decoration: none;
border: 1px solid var(--panel-border);
border-radius: 6px;
padding: 5px 10px;
margin-bottom: 12px;
transition: border-color 0.2s, color 0.2s;
}
#backLink:hover { border-color: var(--accent); color: var(--text); }
#filter-container {
display: flex;
align-items: center;
gap: 12px;
flex-wrap: wrap;
pointer-events: all;
}
#filter-container .filter-group {
position: relative;
}
.filter-btn {
display: flex;
flex-direction: column;
align-items: flex-start;
gap: 2px;
background: var(--panel);
border: 1px solid var(--panel-border);
color: var(--text);
font-family: var(--sans);
padding: 8px 14px;
border-radius: 6px;
outline: none;
cursor: pointer;
min-width: 200px;
transition: border-color 0.2s;
}
.filter-btn:hover, .filter-btn.open { border-color: var(--accent); }
.filter-btn-label {
font-family: var(--mono);
font-size: 10px;
color: var(--text-dim);
text-transform: uppercase;
letter-spacing: 0.08em;
}
.filter-btn-value {
font-family: var(--mono);
font-size: 13px;
color: var(--text);
}
.filter-dropdown {
display: none;
position: absolute;
top: calc(100% + 6px);
left: 0;
min-width: 220px;
max-height: 320px;
overflow-y: auto;
background: var(--panel);
border: 1px solid var(--panel-border);
border-radius: 8px;
box-shadow: 0 12px 40px rgba(0,0,0,0.45);
z-index: 20;
padding: 6px;
}
.filter-dropdown.open { display: block; }
.filter-dropdown-item {
padding: 8px 10px;
border-radius: 5px;
cursor: pointer;
font-family: var(--mono);
font-size: 12px;
color: var(--text);
transition: background 0.12s ease;
}
.filter-dropdown-item:hover { background: #262b30; }
.filter-dropdown-item.active { background: var(--accent-dim); color: #ffcac4; }
.filter-dropdown-item.reset { color: var(--text-dim); border-bottom: 1px solid var(--panel-border); margin-bottom: 4px; border-radius: 5px 5px 0 0; }

#emptyState {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
text-align: center; z-index: 5;
font-family: var(--mono); color: var(--text-dim);
pointer-events: none;
}
#emptyState .big { font-size: 15px; color: var(--text); margin-bottom: 6px; }
#emptyState .small { font-size: 12px; opacity: 0.6; }

#panel {
position: absolute; bottom: 24px; left: 24px;
width: 300px;
background: var(--panel);
border: 1px solid var(--panel-border);
border-radius: 10px;
padding: 18px 20px;
pointer-events: all;
z-index: 10;
box-shadow: 0 12px 40px rgba(0,0,0,0.4);
display: none;
}
#panel .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
#panel .row:last-child { margin-bottom: 0; }
#panel .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
#panel .value { font-family: var(--mono); font-size: 13px; color: var(--text); }
#panel .value.dmg { color: var(--accent); font-weight: 700; font-size: 16px; }

#panel .row.entity-row {
display: grid;
grid-template-columns: 74px 1fr auto;
align-items: baseline;
}
#panel .entity-name {
font-family: var(--mono); font-size: 13px; font-weight: 600; color: #4fc3f7;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
margin-left: 15px;
}
#panel .entity-tank {
font-family: var(--mono); font-size: 11px; color: var(--text-dim);
white-space: nowrap; text-align: right;
margin-left: 10px;
}
#panel hr { border: none; border-top: 1px solid var(--panel-border); margin: 12px 0; }

#shotlist-container {
position: absolute; bottom: 24px; right: 24px;
width: 320px;
z-index: 10;
pointer-events: all;
}
#shotlist-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 8px;
}
#shotlist-title {
font-family: var(--mono); font-size: 11px; color: var(--text-dim);
text-transform: uppercase; letter-spacing: 0.08em;
}
#nav {
display: flex; gap: 8px;
}
.nav-btn {
width: 32px; height: 32px;
background: var(--panel);
border: 1px solid var(--panel-border);
border-radius: 8px;
color: var(--text);
font-size: 16px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background 0.12s ease;
}
.nav-btn:hover { background: #262b30; }

#shotlist {
background: var(--panel);
border: 1px solid var(--panel-border);
border-radius: 10px;
padding: 10px;
max-height: 55vh;
overflow-y: auto;
box-shadow: 0 12px 40px rgba(0,0,0,0.4);
display: none;
}
.shot-item {
padding: 10px 12px;
border-radius: 6px;
cursor: pointer;
font-family: var(--mono);
font-size: 12px;
color: var(--text-dim);
display: flex; justify-content: space-between;
transition: background 0.12s ease, color 0.12s ease;
}
.shot-item:hover { background: #24282d; color: var(--text); }
.shot-item.active { background: var(--accent-dim); color: #ffcac4; }
.shot-item .dmg-tag { color: var(--accent); font-weight: 700; }
.shot-item.active .dmg-tag { color: #ff8c80; }
.shot-item .victim-tag { color: #4fc3f7; }

#hint {
pointer-events: none;
font-family: var(--mono); font-size: 11px; color: var(--text-dim); opacity: 0.55;
margin: 4px 0 14px 0;
}
#loading {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
color: #4fc3f7; font-size: 15px; z-index: 30; text-align: center;
font-family: var(--mono);
}
#loading.error { color: #ff5252; max-width: 480px; line-height: 1.5; }
</style>

function loadShotsData() {
const data = normalizeKeys(BATTLE_DATA.shots || []);
console.log(`[hit_viewer] Загружено ${data.length} попаданий`);
return data;
}

function createFallbackTank() {
const group = new THREE.Group();
const steelMat = new THREE.MeshStandardMaterial({
    color: 0x8b9096, metalness: 0.35, roughness: 0.65
});

const hull = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.2, 5.5), steelMat);
hull.position.y = 0.6;
hull.castShadow = true;
group.add(hull);

const turret = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.9, 2.8), steelMat);
turret.position.y = 1.65;
turret.castShadow = true;
group.add(turret);

const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4.5, 8), steelMat);
barrel.rotation.x = Math.PI / 2;
barrel.position.set(0, 1.65, 3.5);
barrel.castShadow = true;
group.add(barrel);

return group;
}

function tankModelUrlFromRaw(tankRaw) {
if (!tankRaw) return null;
const idx = tankRaw.indexOf(':');
const techName = idx >= 0 ? tankRaw.slice(idx + 1) : tankRaw;
if (!techName) return null;
return `${MODELS_DIR}${techName}.obj`;
}

async function fetchAndParseObj(url) {
const res = await fetch(url);
if (!res.ok) throw new Error(`HTTP ${res.status}`);
const text = await res.text();
if (!text || !text.trim()) throw new Error('Файл пустой');

const loader = new OBJLoader();
const obj = loader.parse(text);

let meshCount = 0;
obj.traverse(c => { if (c.isMesh) meshCount++; });
if (meshCount === 0) throw new Error('Нет мешей');

const steelMat = new THREE.MeshStandardMaterial({
    color: 0x8b9096, metalness: 0.35, roughness: 0.65, side: THREE.DoubleSide
});
obj.traverse(c => {
    if (c.isMesh) {
        c.material = steelMat;
        c.castShadow = true;
        c.receiveShadow = true;
    }
});
return obj;
}

async function getFallbackModelEntry() {
if (fallbackModelEntry) return fallbackModelEntry;
let model;
try {
    model = await fetchAndParseObj(FALLBACK_MODEL_URL);
    console.log(`[hit_viewer] Запасная модель ${FALLBACK_MODEL_URL} загружена`);
} catch (err) {
    console.warn(`[hit_viewer] Запасная модель ${FALLBACK_MODEL_URL} недоступна: ${err.message}. Используем встроенный меш.`);
    model = createFallbackTank();
}
fallbackModelEntry = { model, footOffsetY: computeFootOffset(model) };
return fallbackModelEntry;
}

async function getTankModelEntry(tankRaw) {
const cacheKey = tankRaw || '__fallback__';
if (tankModelCache.has(cacheKey)) return tankModelCache.get(cacheKey);

const url = tankModelUrlFromRaw(tankRaw);
if (!url) {
    const entry = await getFallbackModelEntry();
    tankModelCache.set(cacheKey, entry);
    return entry;
}

try {
    const model = await fetchAndParseObj(url);
    const entry = { model, footOffsetY: computeFootOffset(model) };
    tankModelCache.set(cacheKey, entry);
    console.log(`[hit_viewer] Модель ${url} загружена для ${tankRaw}`);
    return entry;
} catch (err) {
    console.warn(`[hit_viewer] Не удалось загрузить ${url} для ${tankRaw}: ${err.message}. Используем запасную модель.`);
    const entry = await getFallbackModelEntry();
    tankModelCache.set(cacheKey, entry);
    return entry;
}
}

function computeFootOffset(model) {
const box = new THREE.Box3().setFromObject(model);
if (!isFinite(box.min.y)) return 0;
return -box.min.y;
}

let currentShotObjects = null;

function clearCurrentShot() {
if (!currentShotObjects) return;
scene.remove(currentShotObjects.group);
currentShotObjects.group.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
    }
});
currentShotObjects = null;
}

function fmtVec(v) {
if (!v) return '—';
return `x ${(v.x||0).toFixed(2)}  y ${(v.y||0).toFixed(2)}  z ${(v.z||0).toFixed(2)}`;
}

function vecOf(o) {
return new THREE.Vector3(o?.x || 0, o?.y || 0, o?.z || 0);
}

const IGNORED_MESH_NAME_PATTERNS = [
/track/i,
/wheel/i,
/roller/i,
/_gun_\d+$/i,
/screen/i,
/spaced/i,
];

function isIgnoredHitboxMesh(mesh) {
let node = mesh;
while (node) {
    if (node.name && IGNORED_MESH_NAME_PATTERNS.some(re => re.test(node.name))) {
        return true;
    }
    node = node.parent;
}
return false;
}

async function buildShotScene(shot) {
clearCurrentShot();

const group = new THREE.Group();

const { model: victimModel, footOffsetY } = await getTankModelEntry(shot.victim_tank_raw);

const tank = victimModel.clone(true);
tank.traverse(c => {
    if (c.isMesh) c.material = c.material.clone();
});
tank.position.set(0, footOffsetY, 0);
tank.rotation.set(0, 0, 0);
group.add(tank);
tank.updateMatrixWorld(true);

const shooterWorld = vecOf(shot.shooter_pos);
const victimWorld = vecOf(shot.victim_pos);
const impactWorld = vecOf(shot.impact_point);

let dirWorld = new THREE.Vector3().subVectors(shooterWorld, victimWorld);
if (dirWorld.lengthSq() < 1e-6) {
    dirWorld = new THREE.Vector3().subVectors(shooterWorld, impactWorld);
}
if (dirWorld.lengthSq() < 1e-6) {
    dirWorld = new THREE.Vector3(0, 0, 1);
}
dirWorld.normalize();

const yaw = (shot.victim_ypr && shot.victim_ypr.yaw) || 0;
const dir = dirWorld.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -yaw);
dir.z *= -1;
dir.normalize();

const tankCenterHeight = footOffsetY + 1.0;
const originPoint = new THREE.Vector3(0, tankCenterHeight, 0);
const shooterAnchor = dir.clone().multiplyScalar(TRACER_START_OFFSET + TRACER_LENGTH).add(originPoint);
const rayDir = originPoint.clone().sub(shooterAnchor).normalize();

const collidableMeshes = [];
tank.traverse(c => {
    if (c.isMesh && !isIgnoredHitboxMesh(c)) collidableMeshes.push(c);
});

const raycaster = new THREE.Raycaster(shooterAnchor, rayDir, 0, TRACER_START_OFFSET + TRACER_LENGTH + 1);
const hits = raycaster.intersectObjects(collidableMeshes, false);

let impactPos;
let tracerEnd;
if (hits.length > 0) {
    impactPos = hits[0].point.clone();
    tracerEnd = impactPos;
} else {
    impactPos = dir.clone().multiplyScalar(TRACER_START_OFFSET * 0.55).add(originPoint);
    tracerEnd = impactPos;
}

const IMPACT_RADIUS = 0.14 * 0.8;
const impactGeom = new THREE.SphereGeometry(IMPACT_RADIUS, 20, 20);
const impactMat = new THREE.MeshStandardMaterial({
    color: 0xff4433, emissive: 0x991a10, emissiveIntensity: 0.7,
    metalness: 0.2, roughness: 0.4
});
const impact = new THREE.Mesh(impactGeom, impactMat);
impact.position.copy(impactPos);
group.add(impact);

const haloGeom = new THREE.SphereGeometry(IMPACT_RADIUS * 2, 16, 16);
const haloMat = new THREE.MeshBasicMaterial({
    color: 0xff4433, transparent: true, opacity: 0.25
});
const halo = new THREE.Mesh(haloGeom, haloMat);
halo.position.copy(impactPos);
halo.userData.pulse = true;
group.add(halo);

const lineMat = new THREE.LineBasicMaterial({ color: 0xff4433, transparent: true, opacity: 0.6 });
const lineGeom = new THREE.BufferGeometry().setFromPoints([shooterAnchor, tracerEnd]);
const line = new THREE.Line(lineGeom, lineMat);
group.add(line);

const tracerDist = shooterAnchor.distanceTo(tracerEnd);
if (tracerDist > 0.01) {
    const tracerGeom = new THREE.CylinderGeometry(0.025, 0.07, tracerDist, 8, 1, true);
    const tracerMat = new THREE.MeshBasicMaterial({
        color: 0xff8866, transparent: true, opacity: 0.22, side: THREE.DoubleSide
    });
    const tracer = new THREE.Mesh(tracerGeom, tracerMat);
    const mid = shooterAnchor.clone().lerp(tracerEnd, 0.5);
    tracer.position.copy(mid);
    tracer.lookAt(tracerEnd);
    tracer.rotateX(Math.PI / 2);
    group.add(tracer);
}

const shooterMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.85 })
);
shooterMarker.position.copy(shooterAnchor);
group.add(shooterMarker);

scene.add(group);
currentShotObjects = { group, tank, impact, halo, line, shooterMarker };

const camLookTarget = new THREE.Vector3(0, tankCenterHeight * 0.7, 0);
const camDir = dir.clone().multiplyScalar(-1).add(new THREE.Vector3(0.35, 0.55, 0.35)).normalize();
cameraTargetLook.copy(camLookTarget);
cameraTargetPos.copy(camDir.multiplyScalar(11)).add(camLookTarget);
cameraAnimating = true;

const worldDist = shooterWorld.distanceTo(victimWorld);

return { worldDist };
}

function fmtClock(seconds) {
const s = Math.max(0, Math.round(seconds || 0));
const mm = Math.floor(s / 60);
const ss = s % 60;
return `${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
}

function entityNameOf(shot, role) {
return shot[`${role}_name`] || shot[`${role}_id`] || '—';
}

function entityTankOf(shot, role) {
return shot[`${role}_tank`] || '';
}

let playerShots = [];
let currentIndex = -1;
let loadToken = 0;
let filterMode = 'attacker';
let selectedPlayer = '';

const MODE_LABELS = { attacker: 'Атакующий', victim: 'Жертва' };

function buildDropdown(dropdownEl, names, currentValue, onPick, { withReset = true, resetLabel = '— все —' } = {}) {
dropdownEl.innerHTML = '';
dropdownEl.onclick = (e) => e.stopPropagation();

if (withReset) {
    const resetItem = document.createElement('div');
    resetItem.className = 'filter-dropdown-item reset';
    resetItem.textContent = resetLabel;
    resetItem.addEventListener('click', () => onPick(''));
    dropdownEl.appendChild(resetItem);
}

names.forEach(name => {
    const item = document.createElement('div');
    item.className = 'filter-dropdown-item';
    if (name === currentValue) item.classList.add('active');
    item.textContent = name;
    item.addEventListener('click', () => onPick(name));
    dropdownEl.appendChild(item);
});
}

function closeAllDropdowns() {
document.querySelectorAll('.filter-dropdown.open').forEach(el => el.classList.remove('open'));
document.querySelectorAll('.filter-btn.open').forEach(el => el.classList.remove('open'));
}

function setupFilterPicker({ btn, dropdown, getNames, getValue, onPick, dropdownOpts }) {
btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = dropdown.classList.contains('open');
    closeAllDropdowns();
    if (isOpen) return;
    buildDropdown(dropdown, getNames(), getValue(), (val) => {
        onPick(val);
        closeAllDropdowns();
    }, dropdownOpts);
    dropdown.classList.add('open');
    btn.classList.add('open');
});
}

function playerNamesForMode(mode) {
const field = mode === 'attacker' ? 'attacker_name' : 'victim_name';
return [...new Set(SHOTS.map(s => s[field]).filter(Boolean))].sort();
}

function populatePlayerFilters() {
setupFilterPicker({
    btn: document.getElementById('modeBtn'),
    dropdown: document.getElementById('modeDropdown'),
    getNames: () => Object.values(MODE_LABELS),
    getValue: () => MODE_LABELS[filterMode],
    onPick: (label) => {
        const newMode = Object.keys(MODE_LABELS).find(k => MODE_LABELS[k] === label);
        if (!newMode || newMode === filterMode) return;
        filterMode = newMode;
        document.getElementById('modeBtnValue').textContent = MODE_LABELS[filterMode];
        document.getElementById('playerBtnLabel').textContent = MODE_LABELS[filterMode];
        const namesInNewMode = playerNamesForMode(filterMode);
        if (!namesInNewMode.includes(selectedPlayer)) {
            selectedPlayer = '';
            document.getElementById('playerBtnValue').textContent = '— выбрать —';
        }
        applyPlayerFilter();
    },
    dropdownOpts: { withReset: false },
});

setupFilterPicker({
    btn: document.getElementById('playerBtn'),
    dropdown: document.getElementById('playerDropdown'),
    getNames: () => playerNamesForMode(filterMode),
    getValue: () => selectedPlayer,
    onPick: (name) => {
        selectedPlayer = name;
        document.getElementById('playerBtnValue').textContent = name || '— выбрать —';
        applyPlayerFilter();
    },
    dropdownOpts: { withReset: true, resetLabel: '— выбрать —' },
});

document.addEventListener('click', closeAllDropdowns);
}

function applyPlayerFilter() {
clearCurrentShot();
currentIndex = -1;

if (!selectedPlayer) {
    playerShots = [];
    ui.panel.style.display = 'none';
    ui.shotlist.style.display = 'none';
    ui.emptyState.style.display = 'block';
    ui.shotlist.innerHTML = '';
    return;
}

const field = filterMode === 'attacker' ? 'attacker_name' : 'victim_name';
playerShots = SHOTS.filter(s => s[field] === selectedPlayer);
ui.emptyState.style.display = 'none';

if (playerShots.length === 0) {
    ui.panel.style.display = 'none';
    ui.shotlist.style.display = 'none';
    return;
}

ui.panel.style.display = 'block';
ui.shotlist.style.display = 'block';
buildShotList();
selectShot(0);
}

let cameraTargetPos = new THREE.Vector3();
let cameraTargetLook = new THREE.Vector3();
let cameraAnimating = false;

async function selectShot(i) {
if (playerShots.length === 0) return;
currentIndex = ((i % playerShots.length) + playerShots.length) % playerShots.length;
const shot = playerShots[currentIndex];

const myToken = ++loadToken;
const { worldDist } = await buildShotScene(shot);
if (myToken !== loadToken) return;

ui.clock.textContent = fmtClock(shot.hit_clock);
ui.attackerName.textContent = entityNameOf(shot, 'attacker');
ui.attackerTank.textContent = entityTankOf(shot, 'attacker');
ui.victimName.textContent = entityNameOf(shot, 'victim');
ui.victimTank.textContent = entityTankOf(shot, 'victim');
ui.dmg.textContent = (shot.damage || 0) + ' HP';
ui.dist.textContent = worldDist.toFixed(1) + ' м';
ui.idx.textContent = `${currentIndex + 1} / ${playerShots.length}`;

document.querySelectorAll('.shot-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === currentIndex);
});
}

function buildShotList() {
const listEl = document.getElementById('shotlist');
listEl.innerHTML = '';
playerShots.forEach((shot, idx) => {
    const item = document.createElement('div');
    item.className = 'shot-item';
    const victimName = shot.victim_name || shot.victim_id || '?';
    item.innerHTML = `<span>№${idx+1} · Время: ${fmtClock(shot.hit_clock)} · → <span class="victim-tag">${victimName}</span></span><span class="dmg-tag">${shot.damage || 0}</span>`;
    item.addEventListener('click', () => selectShot(idx));
    listEl.appendChild(item);
});
}

document.getElementById('prevBtn').addEventListener('click', () => { if (playerShots.length) selectShot(currentIndex - 1); });
document.getElementById('nextBtn').addEventListener('click', () => { if (playerShots.length) selectShot(currentIndex + 1); });
window.addEventListener('keydown', (e) => {
if (!playerShots.length) return;
if (e.key === 'ArrowRight') selectShot(currentIndex + 1);
if (e.key === 'ArrowLeft') selectShot(currentIndex - 1);
});
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
requestAnimationFrame(animate);
const t = clock.getElapsedTime();

if (currentShotObjects && currentShotObjects.halo.userData.pulse) {
    const scale = 1 + 0.3 * Math.sin(t * 4);
    currentShotObjects.halo.scale.set(scale, scale, scale);
}

if (cameraAnimating) {
    camera.position.lerp(cameraTargetPos, 0.08);
    controls.target.lerp(cameraTargetLook, 0.08);
    if (camera.position.distanceTo(cameraTargetPos) < 0.05) cameraAnimating = false;
}

controls.update();
renderer.render(scene, camera);
}

async function init() {
try {
    SHOTS = await loadShotsData();

    populatePlayerFilters();
    ui.emptyState.style.display = 'block';

    ui.loading.style.display = 'none';
    console.log('[hit_viewer] Инициализация завершена успешно');
} catch (err) {
    console.error('[hit_viewer] Критическая ошибка:', err);
    ui.loading.textContent = 'Ошибка: ' + err.message + '\n\nОткройте консоль (F12) для подробностей.';
    ui.loading.classList.add('error');
}
animate();
}

init();
</script>
</body>
</html>
