<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статистика</title>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@600;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="favicon.svg">
  
<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow-x:auto;

  background: url('backgrounds.png') center center no-repeat;
  background-size: cover;
}

@media (min-width: 768px){
  body{
    background-attachment: fixed;
  }
}

.page{
  position:relative;
  z-index:1;
  padding-top:10px;
}

.matrix-title{
  text-align:center;
  font-size:60px;

  font-family: 'Sofia Sans', sans-serif;
  font-weight:700;
  letter-spacing:2px;

  color:#00ff66;
  text-shadow:0 0 20px #00ff66;

  margin-bottom:5px;
}

.buttons{
  text-align:center;
  margin-bottom:10px;
}

.date-buttons{
  text-align:center;
  margin-bottom:10px;
}

button{
  background:#2b2b2b;
  color:#fff;
  border:1px solid #444;
  padding:6px 12px;
  margin:4px;
  border-radius:6px;
  cursor:pointer;
}

button.active{
  background:#4a6ed1;
}

#tableWrapper{
  width:100%;
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  background:#1a1a1a;
  width:max-content;
  min-width:100%;
  table-layout:fixed;
}

th, td{
  border:1px solid #444;
  padding:6px;
  text-align:center;
  transition:0.15s;
}

th:first-child, td:first-child{
  width:180px;
  min-width:180px;
  max-width:180px;
}

/* hover */
tr.hover-row td{
  background: rgba(255,255,255,0.05);
}

td.hover-col, th.hover-col{
  background: rgba(255,255,255,0.05);
}

td.hover-cell{
  background: rgba(255,255,255,0.12);
}

.win{background:#2e5e2e;}
.lose{background:#5e2e2e;}

.alive{color:#00ff66; font-weight:bold;}
.dead{color:#ff4444; font-weight:bold;}

.bottom-line{
  width:90%;
  height:1px;
  background:#00ff66;
  margin:40px auto 10px auto;
  box-shadow:0 0 8px #00ff66;
}

.footer-text{
  text-align:center;
  color:rgba(255,255,255,0.9);
  font-size:14px;
  margin-bottom:20px;
}

.main-tabs{
  text-align:center;
  margin-bottom:15px;
}

.main-tabs button.active{
  background:#2e5e2e;
}

.sub-tabs{
  text-align:center;
  margin-bottom:10px;
}

.sub-tabs button.active{
  background:#2e5e2e;
}

.equip-btn.active{
  background:#2e5e2e;
  border:1px solid #4a8f4a;
}

.equip-buttons{
  margin-top:20px;
  text-align:center;
}

.equipment-wrapper{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.equipment-row{
  align-items:center;
  display:flex;
  justify-content:center;
  gap:20px;
}

.equipment-row + .equipment-row{
  margin-top:40px;
}

.equipment-row img{
  max-width:100%;
  height:auto;
}

.top-row img{
  width:600px;
  height:450px;
  object-fit:cover;

  border-radius:8px;
  border:none;
  background:none;
  padding:0;
}

.bottom-row{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.bottom-row img{
  width:240px;
  height:150px;
  object-fit:cover;

  border-radius:8px;
  border:none;
  background:none;
  padding:0;
}

.bottom-row img{
  display:block;
}

.assist-icons{
  opacity:0.8;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.assist-icons img{
  width:20px;
  height:20px;
  object-fit:contain;
}

</style>
</head>

<body>


<div class="page">

<h1 class="matrix-title">СТАТИСТИКА</h1>

<div class="main-tabs">
  <button class="tab active" onclick="switchTab('stats', event)">Статистика</button>
  <button class="tab" onclick="switchTab('equipment', event)">Оборудование</button>
</div>
<div id="statsPage">

<div class="sub-tabs" id="campaignTabs"></div>
  
<div class="buttons">
  <button class="mode" onclick="loadTable('damage',event)">Урон</button>
  <button class="mode" onclick="loadTable('damage_received',event)">Получено</button>
  <button class="mode" onclick="loadTable('hits',event)">Попадания</button>
  <button class="mode" onclick="loadTable('assist',event)">Ассист</button>
  <button onclick="toggleAverage()">Среднее</button>
</div>

<div class="date-buttons" id="dateButtons"></div>

<div id="tableWrapper">
  <div id="table"></div>
</div>
  
</div> <!-- statsPage -->

<div id="equipmentPage" style="display:none; text-align:center;">

  <div class="sub-tabs" id="equipmentTabs">
    <button class="equip-mode active" onclick="switchEquipmentMode('abs', event)">АБС</button>
    <button class="equip-mode" onclick="switchEquipmentMode('random', event)">Рандом</button>
  </div>

  <div id="equipmentAbs">
  <div class="equip-buttons">
    <button class="equip-btn" onclick="loadEquipment('orso', event)">Orso</button>
    <button class="equip-btn" onclick="loadEquipment('Wilk', event)">Wilk/CS-63</button>
    <button class="equip-btn" onclick="loadEquipment('Concept', event)">Concept No. 5</button>
    <button class="equip-btn" onclick="loadEquipment('278', event)">Об. 278</button>
    <button class="equip-btn" onclick="loadEquipment('100', event)">ТЭТ-100</button>
    <button class="equip-btn" onclick="loadEquipment('50B', event)">АМХ 50B</button>
    <button class="equip-btn" onclick="loadEquipment('T57', event)">T57 Heavy</button>
    <button class="equip-btn" onclick="loadEquipment('5A', event)">WZ-111 5A</button>
    <button class="equip-btn" onclick="loadEquipment('113', event)">113</button>
    <button class="equip-btn" onclick="loadEquipment('260', event)">Об. 260</button>
    <button class="equip-btn" onclick="loadEquipment('907', event)">Об. 907</button>
    <button class="equip-btn" onclick="loadEquipment('Chieftain', event)">T95/FV4201 Chieftain</button>
    <button class="equip-btn" onclick="loadEquipment('Gendarme', event)">Gendarme</button>
    <button class="equip-btn" onclick="loadEquipment('277', event)">Об. 277</button>
    <button class="equip-btn" onclick="loadEquipment('279', event)">Об. 279(р)</button>
    <button class="equip-btn" onclick="loadEquipment('116', event)">116 F3</button>
    <button class="equip-btn" onclick="loadEquipment('74', event)">BZ-74-1</button>
    <button class="equip-btn" onclick="loadEquipment('Zubr', event)">Zubr</button>
    <button class="equip-btn" onclick="loadEquipment('140', event)">Об. 140</button>
    <button class="equip-btn" onclick="loadEquipment('62A', event)">Т-62А</button>
    <button class="equip-btn" onclick="loadEquipment('Merkava', event)">Merkava LP</button>
    <button class="equip-btn" onclick="loadEquipment('75', event)">BZ-75</button>
    <button class="equip-btn" onclick="loadEquipment('4', event)">ИС-4</button>
    <button class="equip-btn" onclick="loadEquipment('Feuerbar', event)">Feuerbar</button>
    <button class="equip-btn" onclick="loadEquipment('T95E6', event)">T95E6</button>
    <button class="equip-btn" onclick="loadEquipment('Murat', event)">Projet Murat</button>
    <button class="equip-btn" onclick="loadEquipment('114', event)">114 SP2</button>
    <button class="equip-btn" onclick="loadEquipment('780', event)">Об. 780</button>
    <button class="equip-btn" onclick="loadEquipment('StuGMaus', event)">StuG Maus</button>
    <button class="equip-btn" onclick="loadEquipment('DZT', event)">DZT-159</button>
    <button class="equip-btn" onclick="loadEquipment('T110E4', event)">T110E4</button>
    <button class="equip-btn" onclick="loadEquipment('T110E5', event)">T110E5</button>
    <button class="equip-btn" onclick="loadEquipment('113G', event)">WZ-113G FT</button>
  </div>

  <div id="equipmentContent"></div>
  </div>

  <div id="equipmentRandom" style="display:none;">
    <p>Раздел «Рандом» пока пустой — добавим данные, когда они появятся.</p>
  </div>

</div>
  
<div class="bottom-line"></div>
<div class="footer-text">Created by McQueen</div>

</div>

<script>
let DATA = null;

function escapeHtml(value){
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function parseDate(str){
  const [d,m,y] = str.split(".").map(Number);
  const year = Number.isFinite(y) ? y : new Date().getFullYear();
  return new Date(year, (m||1)-1, d||1);
}

function switchTab(tab, event){

  document.querySelectorAll(".tab")
    .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  if(tab==="stats"){
    document.getElementById("statsPage").style.display="block";
    document.getElementById("equipmentPage").style.display="none";
  } else {
    document.getElementById("statsPage").style.display="none";
    document.getElementById("equipmentPage").style.display="block";
  }
}
  
let avgPosition = "left";

let currentType = "damage";
let currentDate = null;

const DATA_FILES = [
  "data/battle_data.json",
  "data/2.json",
  "data/3.json",
  "data/4.json",
  "data/5.json",
  "data/6.json",
  "data/7.json",
  "data/8.json"
  // сюда просто добавляешь новые файлы
];


const CAMPAIGNS = [
  { key: "global_map", label: "Глобальная карта", start: [3, 23], end: [4, 5] },
  { key: "thunder", label: "И грянул гром", start: [4, 20], end: [4, 26] },
  { key: "rain_wall", label: "Стена дождя", start: [5, 12], end: [5, 18] },
  { key: "eternal_storm", label: "Вечная гроза", start: [6, 1], end: [6, 7] }
];

let currentCampaign = CAMPAIGNS[0].key;

function getCampaignByDate(dateStr){
  const parsed = parseDate(dateStr);
  const month = parsed.getMonth() + 1;
  const day = parsed.getDate();

  return CAMPAIGNS.find(c => {
    const [sm, sd] = c.start;
    const [em, ed] = c.end;
    if(month < sm || month > em) return false;
    if(month === sm && day < sd) return false;
    if(month === em && day > ed) return false;
    return true;
  })?.key || null;
}

function switchCampaign(key, event){
  currentCampaign = key;
  document.querySelectorAll("#campaignTabs button")
    .forEach(b => b.classList.remove("active"));
  if(event) event.target.classList.add("active");
  renderCampaignTabs();
  initDates();
  loadTable(currentType);
}

function renderCampaignTabs(){
  const wrap = document.getElementById("campaignTabs");
  wrap.innerHTML = "";

  CAMPAIGNS.forEach((campaign, idx) => {
    const btn = document.createElement("button");
    btn.textContent = campaign.label;
    if(campaign.key === currentCampaign) btn.classList.add("active");
    btn.onclick = (event) => switchCampaign(campaign.key, event);
    wrap.appendChild(btn);
  });
}

function switchEquipmentMode(mode, event){
  document.querySelectorAll(".equip-mode").forEach(btn => btn.classList.remove("active"));
  if(event) event.target.classList.add("active");

  const abs = document.getElementById("equipmentAbs");
  const random = document.getElementById("equipmentRandom");

  if(mode === "abs"){
    abs.style.display = "block";
    random.style.display = "none";
  } else {
    abs.style.display = "none";
    random.style.display = "block";
  }
}

Promise.all(
  DATA_FILES.map(async file => {
    const response = await fetch(file);
    if(!response.ok){
      throw new Error(`Не удалось загрузить ${file}: ${response.status}`);
    }
    return response.json();
  })
)
.then(allData => {
  DATA = {
    battles: allData.flatMap(d => d.battles || [])
  };

  initDates();
  loadTable(currentType);
})
.catch(error => {
  document.getElementById("table").textContent = `Ошибка загрузки данных: ${error.message}`;
});

function toggleAverage(){
  avgPosition = avgPosition==="right" ? "left" : "right";
  loadTable(currentType);
}

function initDates(){
  const box=document.getElementById("dateButtons");
  box.innerHTML="";

  let dates=[...new Set(DATA.battles
    .filter(b => getCampaignByDate(b.date) === currentCampaign)
    .map(b=>b.date))];
  dates.sort((a,b)=>parseDate(a)-parseDate(b));

  if(!dates.length){
    box.innerHTML = "<p>Для этого блока пока нет данных.</p>";
    currentDate = null;
    loadTable(currentType);
    return;
  }

  dates.forEach((date,index)=>{
    let btn=document.createElement("button");
    btn.innerText=date;

    btn.onclick=()=>{
      currentDate=date;
      document.querySelectorAll(".date-buttons button")
        .forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      loadTable(currentType);
    };

    box.appendChild(btn);

    if(index===0){
      btn.classList.add("active");
      currentDate=date;
    }
  });

  let allBtn=document.createElement("button");
  allBtn.innerText="ВСЕ БОИ";

  allBtn.onclick=()=>{
    currentDate=null;
    document.querySelectorAll(".date-buttons button")
      .forEach(b=>b.classList.remove("active"));
    allBtn.classList.add("active");
    loadTable(currentType);
  };

  box.appendChild(allBtn);
}

function getPenRate(name,battles){
  let hits=0,pen=0;

  battles.forEach(b=>{
    let p=b.players[name];
    if(!p) return;
    hits+=p.hits;
    pen+=p.piercings;
  });

  return hits ? pen/hits : 0;
}

function loadTable(type,event){

  currentType=type;

  if(event){
    document.querySelectorAll(".mode")
      .forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
  }

  let battles=DATA.battles.filter(
    b=>getCampaignByDate(b.date)===currentCampaign && (!currentDate || b.date===currentDate)
  );

  if(!battles.length){
    document.getElementById("table").innerHTML="Нет боёв";
    return;
  }

  let players={};

  battles.forEach((battle,idx)=>{
    for(let name in battle.players){

      let p=battle.players[name];
      if(!players[name]) players[name]={};

      let value=0;

      if(type==="damage") value=p.damage;
      if(type==="damage_received") value=p.damage_received;
      if(type==="hits") value=`${p.shots}/${p.hits}/${p.piercings}`;
      if(type==="assist") value=p.assist_track+p.assist_radio;

      players[name][idx]={
        tank:p.tank,
        value:value,
        assist_track:p.assist_track,
        assist_radio:p.assist_radio,
        alive:p.alive
      };
    }
  });

  let averages={};

  for(let name in players){
    let sum=0,count=0;

    battles.forEach((b,i)=>{
      let cell=players[name][i];
      if(!cell) return;

      if(typeof cell.value==="number"){
        sum+=cell.value;
        count++;
      }
    });

    averages[name]=count ? Math.round(sum/count) : 0;
  }

  let sorted=Object.keys(players);

  if(type==="hits")
    sorted.sort((a,b)=>getPenRate(b,battles)-getPenRate(a,battles));
  else
    sorted.sort((a,b)=>averages[b]-averages[a]);

  let html="<table>";
  html+="<tr><th>Ник</th>";

  if(type==="hits" && avgPosition==="left") html+="<th>%</th>";
  if(type!=="hits" && avgPosition==="left") html+="<th>Среднее</th>";

  battles.forEach(b=>{
    html+=`<th class="${b.win?"win":"lose"}">${escapeHtml(b.map)}</th>`;
  });

  if(type==="hits" && avgPosition==="right") html+="<th>%</th>";
  if(type!=="hits" && avgPosition==="right") html+="<th>Среднее</th>";

  html+="</tr>";

  sorted.forEach(name=>{
    html+="<tr>";
    html+=`<td>${escapeHtml(name)}</td>`;

    if(type==="hits" && avgPosition==="left")
      html+=`<td>${Math.round(getPenRate(name,battles)*100)}%</td>`;

    if(type!=="hits" && avgPosition==="left")
      html+=`<td>${averages[name]}</td>`;

    battles.forEach((b,i)=>{
      let cell=players[name][i];

      if(!cell){
        html+="<td></td>";
        return;
      }

      let tankClass = cell.alive ? "alive":"dead";

      let displayValue = cell.value;

      if(type==="assist"){
          displayValue = `
            ${cell.value}
            <br>
            <small class="assist-icons">
              <img src="icons/track.png"> ${cell.assist_track}
              &nbsp;|&nbsp;
              <img src="icons/spot.png"> ${cell.assist_radio}
            </small>
          `;
        }

      html+=`<td>
        <span class="${tankClass}">${escapeHtml(cell.tank)}</span><br>
        ${displayValue}
      </td>`;
    });

    if(type==="hits" && avgPosition==="right")
      html+=`<td>${Math.round(getPenRate(name,battles)*100)}%</td>`;

    if(type!=="hits" && avgPosition==="right")
      html+=`<td>${averages[name]}</td>`;

    html+="</tr>";
  });

  html+="</table>";

  document.getElementById("table").innerHTML=html;

  enableHover();
}

/* hover */
function enableHover(){
  const table=document.querySelector("table");
  if(!table) return;

  const cells=table.querySelectorAll("td");

  cells.forEach(cell=>{
    cell.addEventListener("mouseenter",()=>{
      const row=cell.parentElement;
      const index=cell.cellIndex;

      row.classList.add("hover-row");

      table.querySelectorAll("tr").forEach(tr=>{
        if(tr.children[index]){
          tr.children[index].classList.add("hover-col");
        }
      });

      cell.classList.add("hover-cell");
    });

    cell.addEventListener("mouseleave",()=>{
      const row=cell.parentElement;
      const index=cell.cellIndex;

      row.classList.remove("hover-row");

      table.querySelectorAll("tr").forEach(tr=>{
        if(tr.children[index]){
          tr.children[index].classList.remove("hover-col");
        }
      });

      cell.classList.remove("hover-cell");
    });
  });
}

const TANK_KEYS = [
  "orso","Wilk","Concept","278","100","50B","T57","5A","113","260",
  "907","Chieftain","Gendarme","277","279","116","74","Zubr",
  "140","62A","Merkava","75","4","Feuerbar","T95E6","Murat",
  "114","780","StuGMaus","DZT","T110E4","T110E5","113G"
];

const EQUIPMENT = {};

TANK_KEYS.forEach(key => {
  EQUIPMENT[key] = {
    name: key,
    row1: [
      `images/${key}_01.png`
    ],
    row2: [
      `Modernization/${key}/2.png`,
      `Modernization/${key}/4.png`,
      `Modernization/${key}/5.png`,
      `Modernization/${key}/7.png`,
      `Modernization/${key}/8.png`
    ]
  };
});

function loadEquipment(key, event){

  document.querySelectorAll(".equip-btn")
    .forEach(b => b.classList.remove("active"));

  if(event){
    event.target.classList.add("active");
  }

  let data = EQUIPMENT[key];
  if(!data) return;
  
  let html = "";
  html += `<div class="equipment-wrapper">`;

  html += `<div class="equipment-row top-row">`;
  data.row1.forEach(img=>{
    html += `<img src="${img}">`;
  });
  html += `</div>`;

  html += `<div class="equipment-row bottom-row">`;
  data.row2.forEach(img=>{
    html += `<img src="${img}">`;
  });
  html += `</div>`;

  html += `</div>`;

  document.getElementById("equipmentContent").innerHTML = html;
}


window.addEventListener("DOMContentLoaded", () => {
  const firstBtn = document.querySelector(".equip-btn");

  if(firstBtn){
    firstBtn.click();
  }
});

</script>

</body>
</html>
